// ── Connexion serveur ─────────────────────────────────────────────────────────
function getToken() { try{return sessionStorage.getItem("objp-token")||"";}catch(e){return "";} }
function setToken(t) { try{if(t)sessionStorage.setItem("objp-token",t);else sessionStorage.removeItem("objp-token");}catch(e){} }
function apiGet(path) {
  return fetch(path,{headers:{"Authorization":"Bearer "+getToken()}}).then(function(r){return r.json();});
}
function apiPost(path,body) {
  return fetch(path,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+getToken()},body:JSON.stringify(body)}).then(function(r){return r.json();});
}

function useStyles(pal) {

      elS.id = idStatic;
      elS.textContent = [
        "@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800;900&display=swap');",
        "*{box-sizing:border-box;margin:0;padding:0;}",
        "input,select,textarea{font-family:"+FONT+";outline:none;}",
        "input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}",
        "@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}",
        "@keyframes pop{0%{transform:scale(.75);opacity:0;}65%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}",
        "@keyframes shine{0%{background-position:-200% center;}100%{background-position:200% center;}}",
        "@keyframes burst{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.25) rotate(4deg);}100%{transform:scale(1);opacity:1;}}",
        "@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}",
        "@keyframes spin{to{transform:rotate(360deg)}}",
        "@keyframes notif{0%{transform:translateX(120%);}100%{transform:translateX(0);}}",
        ".fu{animation:fadeUp .4s ease both;}",
        ".pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1) both;}",
        ".burst{animation:burst .5s cubic-bezier(.34,1.56,.64,1) both;}",
        ".float{animation:float 3s ease-in-out infinite;}",
        ".ch:hover{filter:brightness(1.08);transform:translateY(-1px);transition:all .15s;}",
        ".notif{animation:notif .4s cubic-bezier(.34,1.56,.64,1) both;}",
      ].join("");
      document.head.appendChild(elS);
    }
    // Styles dynamiques (couleurs) — réinjectés à chaque changement de thème
    var idDyn = "objp-styles-dyn";
    var elD = document.getElementById(idDyn) || document.createElement("style");
    elD.id = idDyn;
    elD.textContent = [
      "body{background:"+palette.bg+";color:"+palette.tx+";font-family:"+FONT+";overflow-x:hidden;transition:background .25s,color .25s;}",
      "::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:"+palette.bg2+";} ::-webkit-scrollbar-thumb{background:"+palette.purple+";border-radius:3px;}",
      ".shine{background:linear-gradient(90deg,"+palette.purple+","+palette.pink+","+palette.blue+","+palette.purple+");background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite;}",
      ".card-h:hover{transform:translateY(-2px);border-color:"+palette.purple+"66!important;transition:all .2s;}",
      ".inp:focus{border-color:"+palette.purple+"!important;box-shadow:0 0 0 3px "+palette.purple+"33;}",
      ".pw-toggle:hover{color:"+palette.purple+"!important;}",
    ].join("");
    if (!document.getElementById(idDyn)) document.head.appendChild(elD);
  }, [palette.bg]);
}

function getCpsSuggerees(catId){ return CPS_ALL.filter(function(c){return c.cats.indexOf(catId)>=0;}); }

var BADGES = [
  {id:"first",   ico:"👣", label:"Premier pas",    desc:"1er objectif validé"},
  {id:"assidu",  ico:"📅", label:"Assidu",          desc:"5 objectifs validés"},
  {id:"star",    ico:"⭐", label:"Étoile montante", desc:"80 points cumulés"},
  {id:"champ",   ico:"🏆", label:"Champion",        desc:"200 points cumulés"},
  {id:"social",  ico:"💬", label:"Social+",         desc:"Objectif social validé"},
  {id:"sport",   ico:"⚽", label:"Sportif",         desc:"Objectif sport validé"},
  {id:"bookworm",ico:"📚", label:"Lecteur",         desc:"Objectif scolaire validé"},
  {id:"projet",  ico:"🎯", label:"Créatif",         desc:"Objectif projet validé"},
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function getPoints(uid, objectifs) {
  return objectifs.filter(function(o){return o.jeuneId===uid && o.statut==="valide";})
    .reduce(function(s,o){return s+o.pts;},0);
}
function getNiveau(pts) {
  var n=NIVEAUX[0];
  for(var i=NIVEAUX.length-1;i>=0;i--){if(pts>=NIVEAUX[i].min){n=NIVEAUX[i];break;}}
  return n;
}
function getBadges(uid, objectifs) {
  var val=objectifs.filter(function(o){return o.jeuneId===uid&&o.statut==="valide";});
  var pts=val.reduce(function(s,o){return s+o.pts;},0);
  var got=[];
  if(val.length>=1) got.push("first");
  if(val.length>=5) got.push("assidu");
  if(pts>=80)  got.push("star");
  if(pts>=200) got.push("champ");
  if(val.find(function(o){return o.cat==="social";}))  got.push("social");
  if(val.find(function(o){return o.cat==="sport";}))   got.push("sport");
  if(val.find(function(o){return o.cat==="scol";}))    got.push("bookworm");
  if(val.find(function(o){return o.cat==="projet";}))  got.push("projet");
  return got;
}
function cat(id) { return CATS.find(function(c){return c.id===id;}) || {ico:"🎯",label:"Objectif",c:P.purple}; }

// ── Écran de connexion ────────────────────────────────────────────────────────
function LoginScreen(p) {
  var T = useTheme();
  var [login,    setLogin]    = useState("");
  var [mdp,      setMdp]      = useState("");
  var [showMdp,  setShowMdp]  = useState(false);
  var [error,    setError]    = useState("");
  var [loading,  setLoading]  = useState(false);
  // "login" | "reset_id" | "reset_code" | "reset_newmdp"
  var [mode,     setMode]     = useState("login");
  var [resetLogin, setResetLogin] = useState("");
  var [resetCode,    setResetCode]    = useState("");
  var [resetUser,    setResetUser]    = useState(null);
  var [newMdp,       setNewMdp]       = useState("");
  var [showNew,      setShowNew]      = useState(false);
  var [newMdp2,      setNewMdp2]      = useState("");
  var [resetOk,      setResetOk]      = useState(false);
  var [resetToken,   setResetToken]   = useState("");
  var [resetUserId,  setResetUserId]  = useState(null);

  function doLogin() {
    setError("");
    if (!login.trim() || !mdp) { setError("Remplis tous les champs."); return; }
    setLoading(true);
    apiPost("/api/auth", {login:login.trim(), mdp:mdp}).then(function(data){
      setLoading(false);
      if (data.ok) { setToken(data.token); p.onLogin(data.user); }
      else { setError("Identifiant ou mot de passe incorrect."); setMdp(""); }
    }).catch(function(){ setLoading(false); setError("Impossible de contacter le serveur."); });
  }
  function onKey(e) { if(e.key==="Enter") doLogin(); }

  // Étape 1 : vérifier l'identifiant (réservé aux jeunes)
  function doResetEtape1() {
    setError("");
    if (!resetLogin.trim()) { setError("Saisis ton identifiant."); return; }
    var found = p.users.find(function(u){ return u.login.toLowerCase()===resetLogin.trim().toLowerCase(); });
    if (!found) { setError("Identifiant introuvable."); return; }
    if (found.role !== "jeune") { setError("La réinitialisation de mot de passe est réservée aux jeunes. Contacte l'administrateur."); return; }
    setResetUser(found);
    setMode("reset_code");
    setError("");
  }

  // Étape 2 : vérifier le code via le serveur
  function doResetEtape2() {
    setError("");
    if (!resetCode.trim()) { setError("Saisis le code fourni par ton éducateur."); return; }
    setLoading(true);
    apiPost("/api/verify-reset-code", {login:resetUser.login, code:resetCode.trim().toUpperCase()}).then(function(data){
      setLoading(false);
      if (data.ok) { setResetToken(data.resetToken); setResetUserId(data.userId); setMode("reset_newmdp"); setError(""); }
      else { setError(data.error || "Code invalide ou expiré. Demande un nouveau code à ton éducateur."); }
    }).catch(function(){ setLoading(false); setError("Impossible de contacter le serveur."); });
  }

  // Étape 3 : enregistrer le nouveau mot de passe via le serveur
  function doResetEtape3() {
    setError("");
    if (newMdp.length < 6) { setError("Le mot de passe doit faire au moins 6 caractères."); return; }
    if (newMdp !== newMdp2) { setError("Les deux mots de passe ne correspondent pas."); return; }
    setLoading(true);
    apiPost("/api/reset-password", {userId:resetUserId, resetToken:resetToken, newMdp:newMdp}).then(function(data){
      setLoading(false);
      if (data.ok) { setResetOk(true); setMode("reset_done"); }
      else { setError(data.error || "Erreur lors de la réinitialisation."); }
    }).catch(function(){ setLoading(false); setError("Impossible de contacter le serveur."); });
  }

  function retourLogin() {
    setMode("login"); setError(""); setResetLogin(""); setResetCode("");
    setResetUser(null); setNewMdp(""); setNewMdp2(""); setResetOk(false);
    setResetToken(""); setResetUserId(null);
  }

  return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT,padding:20,transition:"background .25s"}}>
      <div style={{position:"fixed",top:16,right:16,zIndex:10}}>
        <ThemeToggle isDark={T.bg===PALETTE_DARK.bg} onToggle={p.onToggleTheme}/>
      </div>
      <div style={{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
        <div style={{position:"absolute",top:"-20%",left:"-15%",width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,"+T.purple+"18 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:"-10%",right:"-10%",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,"+T.teal+"14 0%,transparent 70%)"}}/>
      </div>

      <div className="fu" style={{display:"flex",flexDirection:"column",alignItems:"center",position:"relative",zIndex:1,maxWidth:780,width:"100%"}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:36}}>
          <div className="float" style={{fontSize:56,marginBottom:10}}>🎯</div>
          <div style={{fontFamily:FONT_D,fontSize:38,letterSpacing:1,marginBottom:6}}>Objectif<span className="shine">+</span></div>
          <div style={{fontSize:14,color:T.tx2}}>Accomplis tes objectifs, gagne des récompenses !</div>
        </div>

        {/* ══ MODE CONNEXION ══ */}
        {mode==="login" && <div style={{width:"100%",maxWidth:420}}>
          <div>
            <Card style={{padding:28}}>
              <div style={{fontSize:17,fontWeight:800,marginBottom:22,textAlign:"center"}}>Connexion</div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Identifiant</div>
                <Inp value={login} onChange={function(e){setLogin(e.target.value);setError("");}} onKeyPress={onKey} placeholder="ex: flash10 ou j.dupont" style={{fontSize:15}}/>
              </div>
              <div style={{marginBottom:6}}>
                <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Mot de passe</div>
                <div style={{position:"relative"}}>
                  <Inp type={showMdp?"text":"password"} value={mdp} onChange={function(e){setMdp(e.target.value);setError("");}} onKeyPress={onKey} placeholder="••••••••" style={{paddingRight:42,fontSize:15}}/>
                  <span className="pw-toggle" onClick={function(){setShowMdp(function(v){return !v;});}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:T.tx3,fontSize:16,transition:"color .15s",userSelect:"none"}}>{showMdp?"🙈":"👁️"}</span>
                </div>
              </div>
              {error && <div style={{color:T.redL,fontSize:13,marginBottom:10,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>⚠️ {error}</div>}
              <Btn bg={T.purple} style={{width:"100%",justifyContent:"center",marginTop:16,padding:"13px"}} onClick={doLogin} disabled={loading}>
                {loading ? <span style={{width:18,height:18,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/> : "Se connecter →"}
              </Btn>
              {/* Lien mot de passe oublié */}
              <div style={{textAlign:"center",marginTop:14}}>
                <span role="button" onClick={function(){setMode("reset_id");setError("");setResetLogin(login);}} style={{fontSize:12,color:T.tx3,cursor:"pointer",textDecoration:"underline",transition:"color .15s"}}
                  onMouseEnter={function(e){e.currentTarget.style.color=T.purpleL;}}
                  onMouseLeave={function(e){e.currentTarget.style.color=T.tx3;}}
                >🔑 Mot de passe oublié ?</span>
              </div>
            </Card>
            <div style={{textAlign:"center",marginTop:18,fontSize:11,color:T.tx3,lineHeight:1.6}}>
              Développé par<br/>
              <span style={{fontWeight:700,color:T.tx2}}>DTPJJ Lorraine Sud</span> &amp; <span style={{fontWeight:700,color:T.tx2}}>STEMO des Vosges</span>
            </div>
          </div>
        </div>}

        {/* ══ RESET — ÉTAPE 1 : identifiant ══ */}
        {mode==="reset_id" && <div style={{width:"100%",maxWidth:420}} className="fu">
          <Card style={{padding:30}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:42,marginBottom:8}}>🔑</div>
              <div style={{fontSize:18,fontWeight:800,marginBottom:6}}>Mot de passe oublié</div>
              <div style={{fontSize:13,color:T.tx2}}>Saisis ton identifiant. Ton éducateur (ou l'admin) te donnera ensuite un code de réinitialisation.</div>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Ton identifiant</div>
              <Inp value={resetLogin} onChange={function(e){setResetLogin(e.target.value);setError("");}} placeholder="ex: flash10 ou j.dupont" onKeyPress={function(e){if(e.key==="Enter")doResetEtape1();}}/>
            </div>
            {error && <div style={{color:T.redL,fontSize:13,margin:"8px 0",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>⚠️ {error}</div>}
            <div style={{display:"flex",gap:10,marginTop:18}}>
              <Btn ghost color={T.tx2} brdC={T.brd} onClick={retourLogin}>← Retour</Btn>
              <Btn bg={T.teal} style={{flex:1,justifyContent:"center"}} onClick={doResetEtape1}>Suivant →</Btn>
            </div>
          </Card>
        </div>}

        {/* ══ RESET — ÉTAPE 2 : saisir le code ══ */}
        {mode==="reset_code" && resetUser && <div style={{width:"100%",maxWidth:420}} className="fu">
          <Card style={{padding:30}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:6}}>{resetUser.avatar}</div>
              <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>Bonjour {resetUser.prenom} !</div>
              <div style={{fontSize:13,color:T.tx2,lineHeight:1.6}}>Demande à ton éducateur ou à l'administrateur de te générer un code de réinitialisation, puis saisis-le ci-dessous.</div>
            </div>
            <div style={{background:T.yellow+"15",border:"1px solid "+T.yellowL+"44",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:T.yellowL}}>
              ⏱️ Le code est valable <strong>30 minutes</strong> après sa génération.
            </div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Code de réinitialisation</div>
              <Inp value={resetCode} onChange={function(e){setResetCode(e.target.value.toUpperCase());setError("");}} placeholder="Ex: RESET-AB12CD34" style={{fontFamily:"monospace",fontSize:16,letterSpacing:2,textAlign:"center"}} onKeyPress={function(e){if(e.key==="Enter")doResetEtape2();}}/>
            </div>
            {error && <div style={{color:T.redL,fontSize:13,margin:"8px 0",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>⚠️ {error}</div>}
            <div style={{display:"flex",gap:10,marginTop:18}}>
              <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setMode("reset_id");setError("");}}>← Retour</Btn>
              <Btn bg={T.teal} style={{flex:1,justifyContent:"center"}} onClick={doResetEtape2}>Valider le code →</Btn>
            </div>
          </Card>
        </div>}

        {/* ══ RESET — ÉTAPE 3 : nouveau mot de passe ══ */}
        {mode==="reset_newmdp" && resetUser && <div style={{width:"100%",maxWidth:420}} className="fu">
          <Card style={{padding:30}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:6}}>🛡️</div>
              <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>Nouveau mot de passe</div>
              <div style={{fontSize:13,color:T.tx2}}>Code validé ! Choisis maintenant ton nouveau mot de passe pour <strong>{resetUser.prenom}</strong>.</div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Nouveau mot de passe</div>
              <div style={{position:"relative"}}>
                <Inp type={showNew?"text":"password"} value={newMdp} onChange={function(e){setNewMdp(e.target.value);setError("");}} placeholder="Minimum 6 caractères" style={{paddingRight:42}}/>
                <span className="pw-toggle" onClick={function(){setShowNew(function(v){return !v;});}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:T.tx3,fontSize:16}}>{showNew?"🙈":"👁️"}</span>
              </div>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Confirmer le mot de passe</div>
              <Inp type="password" value={newMdp2} onChange={function(e){setNewMdp2(e.target.value);setError("");}} placeholder="Répète ton mot de passe" onKeyPress={function(e){if(e.key==="Enter")doResetEtape3();}}/>
              {newMdp2.length>0 && newMdp!==newMdp2 && <div style={{fontSize:11,color:T.redL,marginTop:4}}>⚠️ Les mots de passe ne correspondent pas</div>}
              {newMdp2.length>0 && newMdp===newMdp2 && newMdp.length>=6 && <div style={{fontSize:11,color:T.greenL,marginTop:4}}>✅ Mots de passe identiques</div>}
            </div>
            {error && <div style={{color:T.redL,fontSize:13,margin:"8px 0",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>⚠️ {error}</div>}
            <Btn bg={T.green} style={{width:"100%",justifyContent:"center",marginTop:18,padding:"13px"}} disabled={newMdp.length<6||newMdp!==newMdp2} onClick={doResetEtape3}>✓ Enregistrer le nouveau mot de passe</Btn>
          </Card>
        </div>}

        {/* ══ RESET — SUCCÈS ══ */}
        {mode==="reset_done" && <div style={{width:"100%",maxWidth:420}} className="fu">
          <Card style={{padding:36,textAlign:"center"}}>
            <div className="burst" style={{fontSize:60,marginBottom:14}}>🎉</div>
            <div style={{fontSize:20,fontWeight:900,marginBottom:8,color:T.greenL}}>Mot de passe modifié !</div>
            <div style={{fontSize:14,color:T.tx2,marginBottom:24,lineHeight:1.7}}>
              Ton nouveau mot de passe a bien été enregistré, {resetUser&&resetUser.prenom}.<br/>
              Tu peux maintenant te connecter avec tes nouveaux identifiants.
            </div>
            <Btn bg={T.purple} style={{width:"100%",justifyContent:"center",padding:"13px"}} onClick={function(){retourLogin();setLogin(resetUser?resetUser.login:"");}}>
              → Se connecter maintenant
            </Btn>
          </Card>
        </div>}

      </div>
    </div>
  );
}

// ── Dashboard Jeune ───────────────────────────────────────────────────────────
function DashJeune(p) {
  var T = useTheme();
  var u = p.user;
  var myObjs   = p.objectifs.filter(function(o){return o.jeuneId===u.id;});
  var myEch    = p.echanges.filter(function(e){return e.jeuneId===u.id;});
  var myRecSt  = p.recompenses.filter(function(r){return r.structureId===u.structureId||r.structureId===null;});
  var pts      = getPoints(u.id, p.objectifs);
  var niv      = getNiveau(pts);
  var nxt      = NIVEAUX.find(function(n){return n.min>pts;});
  var myBadges = getBadges(u.id, p.objectifs);
  var [tab,       setTab]       = useState("objectifs");
  var [modal,     setModal]     = useState(null);
  var [msgJeune,  setMsgJeune]  = useState("");
  var [changeMdp, setChangeMdp] = useState(null);

  var enCours  = myObjs.filter(function(o){return o.statut==="en_cours";});
  var attente  = myObjs.filter(function(o){return o.statut==="attente_valid";});
  var valides  = myObjs.filter(function(o){return o.statut==="valide";});
  var refuses  = myObjs.filter(function(o){return o.statut==="refuse";});

  function declarerAtteint(obj) { setModal({type:"declarer", obj:obj}); setMsgJeune(""); }
  function confirmerDeclarer() {
    p.setObjectifs(function(prev){return prev.map(function(o){
      return o.id===modal.obj.id ? Object.assign({},o,{statut:"attente_valid",commentaireJeune:msgJeune}) : o;
    });});
    p.notify("✋ Objectif soumis à validation !", "info");
    setModal(null);
  }
  function ajouterCommentaire(obj) { setModal({type:"comment",obj:obj}); setMsgJeune(obj.commentaireJeune||""); }
  function envoyerCommentaire() {
    p.setObjectifs(function(prev){return prev.map(function(o){
      return o.id===modal.obj.id ? Object.assign({},o,{commentaireJeune:msgJeune}) : o;
    });});
    p.notify("💬 Message envoyé à l'éducateur","info");
    setModal(null);
  }
  function demanderEchange(rec) {
    if(pts<rec.cout){p.notify("Pas assez de points !","error");return;}
    var deja=myEch.find(function(e){return e.recompenseId===rec.id&&e.statut!=="refusee";});
    if(deja){p.notify("Demande déjà envoyée","warn");return;}
    p.setEchanges(function(prev){return [...prev,{id:Date.now(),jeuneId:u.id,recompenseId:rec.id,pts:rec.cout,date:new Date().toISOString().slice(0,10),statut:"demande",validePar:null}];});
    p.notify("🎁 Demande de récompense envoyée à l'éducateur !","success");
  }

  var struct = p.structures.find(function(s){return s.id===u.structureId;}) || {};

  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:FONT}}>
      {/* Header gradient */}
      <div style={{background:"linear-gradient(135deg,"+u.couleur+"dd 0%,"+u.couleur+"66 60%,"+T.bg+" 100%)",padding:"22px 20px 36px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-30,width:180,height:180,borderRadius:"50%",background:u.couleur+"22",pointerEvents:"none"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
          <div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.6)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>{struct.emoji} {struct.nom}</div>
            <div style={{fontFamily:FONT_D,fontSize:26,color:"#fff"}}>{u.prenom}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Btn ghost color="rgba(255,255,255,.6)" brdC="rgba(255,255,255,.2)" sm onClick={function(){setChangeMdp({mdpActuel:"",mdpNew:"",mdpNew2:"",showA:false,showN:false,err:""});}}>🔑</Btn>
            <Btn ghost color="rgba(255,255,255,.6)" brdC="rgba(255,255,255,.2)" sm onClick={p.onLogout}>Déconnexion</Btn>
            <ThemeToggle isDark={p.isDark} onToggle={p.onToggleTheme}/>
          </div>
        </div>
        {/* Niveau + points */}
        <div style={{display:"flex",alignItems:"center",gap:14,background:"rgba(0,0,0,.25)",borderRadius:14,padding:"12px 16px"}}>
          <div style={{fontSize:32}}>{niv.ico}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontWeight:700,color:"#fff"}}>{niv.label}</span>
              <span style={{fontFamily:FONT_D,fontSize:22,color:T.yellowL}}>{pts} pts</span>
            </div>
            {nxt
              ? <Bar val={pts-niv.min} max={nxt.min-niv.min} c="rgba(255,255,255,.4)" c2="rgba(255,255,255,.9)" h={6}/>
              : <div style={{fontSize:12,color:"rgba(255,255,255,.7)"}}>🦸 Niveau maximum atteint !</div>}
            {nxt && <div style={{fontSize:11,color:"rgba(255,255,255,.55)",marginTop:4}}>Prochain : {nxt.ico} {nxt.label} — encore {nxt.min-pts} pts</div>}
          </div>
        </div>
      </div>

      {/* Alerte : objectifs en attente de retour éducateur */}
      {attente.length>0 && <div style={{margin:"12px 16px 0",background:T.yellow+"22",border:"1px solid "+T.yellowL+"55",borderRadius:12,padding:"11px 14px",display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:20}}>⏳</span>
        <span style={{fontSize:13,fontWeight:600,color:T.yellowL}}>{attente.length} objectif{attente.length>1?"s":""} en attente de validation par l'éducateur</span>
      </div>}

      {/* Mini stats */}
      <div style={{padding:"12px 16px 0",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {[
          {ico:"🎯",v:enCours.length, l:"En cours",  c:T.blue},
          {ico:"⏳",v:attente.length, l:"En attente",c:T.yellow},
          {ico:"✅",v:valides.length, l:"Validés",   c:T.green},
          {ico:"🏅",v:myBadges.length,l:"Badges",    c:T.purple},
        ].map(function(s,i){
          return <div key={i} className="pop" style={{background:T.card,border:"1px solid "+T.brd,borderRadius:12,padding:"12px 6px",textAlign:"center",animationDelay:(i*.08)+"s"}}>
            <div style={{fontSize:18,marginBottom:3}}>{s.ico}</div>
            <div style={{fontFamily:FONT_D,fontSize:20,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:T.tx3,marginTop:1}}>{s.l}</div>
          </div>;
        })}
      </div>

      {/* Tabs */}
      <div style={{padding:"14px 16px 0",display:"flex",gap:8,overflowX:"auto"}}>
        {[
          {id:"objectifs",ico:"🎯",l:"Mes objectifs"},
          {id:"recompenses",ico:"🎁",l:"Récompenses"},
          {id:"badges",ico:"🏅",l:"Mes badges"},
        ].map(function(t){
          var act=tab===t.id;
          return <span key={t.id} role="button" onClick={function(){setTab(t.id);}} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:50,background:act?u.couleur:"transparent",color:act?"#fff":T.tx2,fontSize:13,fontWeight:700,cursor:"pointer",border:"1.5px solid "+(act?u.couleur:T.brd),whiteSpace:"nowrap",transition:"all .2s"}}>{t.ico} {t.l}</span>;
        })}
      </div>

      <div style={{padding:16}}>

        {/* ── Objectifs ── */}
        {tab==="objectifs" && <div className="fu">
          {myObjs.length===0 && <Card style={{textAlign:"center",padding:40}}>
            <div style={{fontSize:44,marginBottom:12}}>🌟</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun objectif pour l'instant</div>
            <div style={{fontSize:13,color:T.tx2}}>Ton éducateur va bientôt te fixer des objectifs !</div>
          </Card>}

          {/* En cours */}
          {enCours.length>0 && <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:T.tx3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>🎯 En cours</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {enCours.map(function(o){
                var c=cat(o.cat);
                return <Card key={o.id} style={{borderLeft:"3px solid "+c.c}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:38,height:38,borderRadius:10,background:c.c+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{c.ico}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,marginBottom:5}}>{o.titre}</div>
                      <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                        <Pill c={c.c}>{c.label}</Pill>
                        <Pill c={T.yellow}>+{o.pts} pts</Pill>
                        {o.dateEch && <span style={{fontSize:11,color:T.tx3}}>📅 {o.dateEch}</span>}
                      </div>
                    </div>
                    <Btn bg={T.green} sm onClick={function(){declarerAtteint(o);}}>✋ Atteint</Btn>
                  </div>
                </Card>;
              })}
            </div>
          </div>}

          {/* En attente validation */}
          {attente.length>0 && <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:T.tx3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>⏳ En attente de validation</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {attente.map(function(o){
                var c=cat(o.cat);
                return <Card key={o.id} style={{borderLeft:"3px solid "+T.yellowL,background:T.yellow+"0a"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{fontSize:20,flexShrink:0}}>⏳</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{o.titre}</div>
                      {o.commentaireJeune && <div style={{fontSize:12,color:T.yellowL,fontStyle:"italic",marginBottom:6}}>Ton message : "{o.commentaireJeune}"</div>}
                      <Pill c={T.yellow}>En attente de l'éducateur</Pill>
                    </div>
                  </div>
                </Card>;
              })}
            </div>
          </div>}

          {/* Refusés */}
          {refuses.length>0 && <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:T.tx3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>❌ Non validés</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {refuses.map(function(o){
                return <Card key={o.id} style={{borderLeft:"3px solid "+T.red,opacity:.9}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{fontSize:20,flexShrink:0}}>❌</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{o.titre}</div>
                      {o.commentaireJeune && <div style={{fontSize:12,color:T.tx2,fontStyle:"italic",marginBottom:6}}>Ton explication : "{o.commentaireJeune}"</div>}
                      {!o.commentaireJeune && <div style={{fontSize:12,color:T.tx3,marginBottom:6}}>Tu peux expliquer à l'éducateur ce qui s'est passé.</div>}
                      <Btn sm ghost color={T.orangeL} brdC={T.orange} onClick={function(){ajouterCommentaire(o);}}>
                        {o.commentaireJeune?"✏️ Modifier mon message":"💬 Envoyer une explication"}
                      </Btn>
                    </div>
                  </div>
                </Card>;
              })}
            </div>
          </div>}

          {/* Validés */}
          {valides.length>0 && <div>
            <div style={{fontSize:12,fontWeight:700,color:T.tx3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>✅ Accomplis</div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {valides.map(function(o){
                var c=cat(o.cat);
                return <Card key={o.id} style={{borderLeft:"3px solid "+T.greenL,opacity:.85}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:34,height:34,borderRadius:9,background:T.green+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>✅</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700}}>{o.titre}</div>
                      {o.noteEdu && <div style={{fontSize:12,color:T.greenL,fontStyle:"italic",marginTop:2}}>"{o.noteEdu}" — ton éducateur</div>}
                    </div>
                    <Pill c={T.green}>+{o.pts}</Pill>
                  </div>
                </Card>;
              })}
            </div>
          </div>}
        </div>}

        {/* ── Récompenses ── */}
        {tab==="recompenses" && <div className="fu">
          <div style={{background:"linear-gradient(90deg,"+T.yellow+"33,"+T.orange+"22)",border:"1px solid "+T.yellowL+"44",borderRadius:14,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:30}}>💰</span>
            <div>
              <div style={{fontSize:22,fontWeight:900,color:T.yellowL,fontFamily:FONT_D}}>{pts} points disponibles</div>
              <div style={{fontSize:13,color:T.tx2}}>Échange-les contre des récompenses !</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {myRecSt.map(function(r){
              var can  = pts>=r.cout;
              var deja = myEch.find(function(e){return e.recompenseId===r.id;});
              var dejaStatut = deja ? deja.statut : null;
              return <Card key={r.id} style={{opacity:can||deja?1:.65}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:38,flexShrink:0}}>{r.ico}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>{r.titre}</div>
                    <div style={{fontSize:12,color:T.tx2,marginBottom:7}}>{r.description}</div>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                      <Pill c={T.yellow}>{r.cout} pts</Pill>
                      {dejaStatut==="accordee" && <Pill c={T.green}>✅ Obtenu !</Pill>}
                      {dejaStatut==="demande"  && <Pill c={T.yellow}>⏳ En attente accord éducateur</Pill>}
                      {dejaStatut==="refusee"  && <Pill c={T.red}>❌ Refusée</Pill>}
                      {!deja && !can && <span style={{fontSize:11,color:T.tx3}}>Encore {r.cout-pts} pts</span>}
                    </div>
                  </div>
                  {!deja && can && <Btn bg={u.couleur} onClick={function(){demanderEchange(r);}}>Demander 🎁</Btn>}
                </div>
                {!deja && <div style={{marginTop:8}}>
                  <Bar val={pts} max={r.cout} c={u.couleur} c2={u.couleur} h={4}/>
                </div>}
              </Card>;
            })}
          </div>
        </div>}

        {/* ── Badges ── */}
        {tab==="badges" && <div className="fu">
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
            {BADGES.map(function(b){
              var has=myBadges.indexOf(b.id)>=0;
              return <Card key={b.id} style={{textAlign:"center",padding:18,opacity:has?1:.35,borderColor:has?T.purple:T.brd}}>
                <div style={{fontSize:32,marginBottom:7,filter:has?"none":"grayscale(1)",animation:has?"float 3s ease-in-out infinite":"none"}}>{b.ico}</div>
                <div style={{fontSize:13,fontWeight:800,marginBottom:3}}>{b.label}</div>
                <div style={{fontSize:11,color:T.tx2}}>{b.desc}</div>
                {has && <div style={{marginTop:8}}><Pill c={T.green}>✅ Obtenu</Pill></div>}
              </Card>;
            })}
          </div>
        </div>}
      </div>

      {/* ── Modals jeune ── */}
      {modal && modal.type==="declarer" && <Modal onClose={function(){setModal(null);}}>
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:42,marginBottom:8}}>✋</div>
          <div style={{fontSize:18,fontWeight:800}}>Déclarer l'objectif atteint</div>
          <div style={{fontSize:14,color:T.tx2,marginTop:6}}>"{modal.obj.titre}"</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Ajoute un message à l'éducateur (facultatif)</div>
          <textarea value={msgJeune} onChange={function(e){setMsgJeune(e.target.value);}} placeholder="Ex: J'ai fait tous mes devoirs cette semaine, je suis allé en cours tous les jours..." style={{width:"100%",minHeight:90,background:"rgba(255,255,255,.05)",border:"1.5px solid "+T.brd2,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.tx,resize:"vertical",fontFamily:FONT}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn ghost color={T.tx2} onClick={function(){setModal(null);}}>Annuler</Btn>
          <Btn bg={T.green} style={{flex:1,justifyContent:"center"}} onClick={confirmerDeclarer}>✋ Envoyer à l'éducateur</Btn>
        </div>
      </Modal>}

      {modal && modal.type==="comment" && <Modal onClose={function(){setModal(null);}}>
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:42,marginBottom:8}}>💬</div>
          <div style={{fontSize:18,fontWeight:800}}>Envoyer une explication</div>
          <div style={{fontSize:14,color:T.tx2,marginTop:6}}>"{modal.obj.titre}"</div>
        </div>
        <div style={{marginBottom:14}}>
          <textarea value={msgJeune} onChange={function(e){setMsgJeune(e.target.value);}} placeholder="Explique ce qui s'est passé, pourquoi c'était difficile..." style={{width:"100%",minHeight:100,background:"rgba(255,255,255,.05)",border:"1.5px solid "+T.brd2,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.tx,resize:"vertical",fontFamily:FONT}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn ghost color={T.tx2} onClick={function(){setModal(null);}}>Annuler</Btn>
          <Btn bg={T.orange} style={{flex:1,justifyContent:"center"}} onClick={envoyerCommentaire}>💬 Envoyer</Btn>
        </div>
      </Modal>}

      {changeMdp && <Modal onClose={function(){setChangeMdp(null);}} w={420}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <div style={{width:52,height:52,borderRadius:14,background:T.teal+"30",border:"2px solid "+T.teal,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🔑</div>
          <div><div style={{fontSize:18,fontWeight:800}}>Changer mon mot de passe</div></div>
        </div>
        {changeMdp.err && <div style={{background:T.red+"22",border:"1px solid "+T.red,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13,color:T.redL}}>{changeMdp.err}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <div style={{fontSize:13,color:T.tx2,marginBottom:5,fontWeight:600}}>Mot de passe actuel *</div>
            <div style={{position:"relative"}}>
              <Inp type={changeMdp.showA?"text":"password"} value={changeMdp.mdpActuel}
                onChange={function(e){setChangeMdp(function(s){return Object.assign({},s,{mdpActuel:e.target.value,err:""});});}}
                placeholder="Mot de passe actuel" style={{paddingRight:42}}/>
              <span onClick={function(){setChangeMdp(function(s){return Object.assign({},s,{showA:!s.showA});});}}
                style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:T.tx3,fontSize:16,userSelect:"none"}}>
                {changeMdp.showA?"🙈":"👁️"}
              </span>
            </div>
          </div>
          <div>
            <div style={{fontSize:13,color:T.tx2,marginBottom:5,fontWeight:600}}>Nouveau mot de passe * <span style={{fontWeight:400,color:T.tx3}}>(min. 8 caractères)</span></div>
            <Inp type="password" value={changeMdp.mdpNew}
              onChange={function(e){setChangeMdp(function(s){return Object.assign({},s,{mdpNew:e.target.value,err:""});});}}
              placeholder="Nouveau mot de passe"/>
          </div>
          <div>
            <div style={{fontSize:13,color:T.tx2,marginBottom:5,fontWeight:600}}>Confirmer *</div>
            <Inp type="password" value={changeMdp.mdpNew2}
              onChange={function(e){setChangeMdp(function(s){return Object.assign({},s,{mdpNew2:e.target.value,err:""});});}}
              placeholder="Confirmer le nouveau mot de passe"/>
          </div>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setChangeMdp(null);}}>Annuler</Btn>
            <Btn bg={T.teal} style={{flex:1,justifyContent:"center"}} onClick={function(){
              if(!changeMdp.mdpActuel){setChangeMdp(function(s){return Object.assign({},s,{err:"Mot de passe actuel requis."});});return;}
              if(changeMdp.mdpNew.length<8){setChangeMdp(function(s){return Object.assign({},s,{err:"Minimum 8 caractères."});});return;}
              if(changeMdp.mdpNew!==changeMdp.mdpNew2){setChangeMdp(function(s){return Object.assign({},s,{err:"Les mots de passe ne correspondent pas."});});return;}
              apiPost("/api/change-password",{currentMdp:changeMdp.mdpActuel,newMdp:changeMdp.mdpNew}).then(function(data){
                if(data.ok){setChangeMdp(null);p.notify("Mot de passe modifié !","success");}
                else{setChangeMdp(function(s){return Object.assign({},s,{err:data.error||"Erreur."});});}
              });
            }}>✅ Confirmer</Btn>
          </div>
        </div>
      </Modal>}
    </div>
  );
}

// ── Interface Éducateur / Admin ───────────────────────────────────────────────
// ── Panneau Équipes (admin) — composant séparé pour respecter les règles des hooks ──
var EMOJIS_ST = ["🏛️","🌿","⚡","🏠","🎓","🌊","🔥","🌟","🏆","🎯","🏥","🌺"];
var COLS_ST   = ["#7c3aed","#0f766e","#c2410c","#1d4ed8","#be185d","#15803d","#b45309","#0891b2","#4338ca"];
var DROITS_DEF = {
  creerObjectifs:true, validerObjectifs:true, voirTousJeunes:false,
  gererRecompenses:true, accorderRecompenses:true, exportStats:false, modifierProfils:false,
};
var DROITS_LABELS = [
  {k:"creerObjectifs",     l:"Créer des objectifs",         ico:"🎯", desc:"Définir de nouveaux objectifs pour les jeunes"},
  {k:"validerObjectifs",   l:"Valider / refuser objectifs", ico:"✅", desc:"Confirmer qu'un jeune a atteint son objectif"},
  {k:"voirTousJeunes",     l:"Voir tous les jeunes",        ico:"👁️", desc:"Accès aux jeunes des autres éducateurs"},
  {k:"gererRecompenses",   l:"Gérer les récompenses",       ico:"🎁", desc:"Créer, modifier, supprimer les récompenses"},
  {k:"accorderRecompenses",l:"Accorder les récompenses",    ico:"🏅", desc:"Valider les demandes de récompense"},
  {k:"exportStats",        l:"Exporter les statistiques",   ico:"📊", desc:"Télécharger les bilans et rapports"},
  {k:"modifierProfils",    l:"Modifier les profils jeunes", ico:"✏️", desc:"Changer avatar, mot de passe, affectation"},
];

// ── Supervision DT (rôle superviseur_dt) ─────────────────────────────────────
function SupervisionDT(p) {
  var T = useTheme();
  var [filtStructure, setFiltStructure] = useState("toutes");
  var [filtCat,       setFiltCat]       = useState("toutes");
  var [onglet,        setOnglet]        = useState("apercu"); // apercu | jeunes | objectifs | alertes

  var structures = p.structures;
  var allJeunes  = p.users.filter(function(u){return u.role==="jeune";});
  var allEducs   = p.users.filter(function(u){return u.role==="educateur";});
  var allObjs    = p.objectifs;
  var allEchanges= p.echanges;

  // ── KPIs territoriaux ──────────────────────────────────────────────────────
  var totalJeunes  = allJeunes.length;
  var totalObjs    = allObjs.length;
  var objValides   = allObjs.filter(function(o){return o.statut==="valide";});
  var objAttente   = allObjs.filter(function(o){return o.statut==="attente_valid";});
  var objRefuses   = allObjs.filter(function(o){return o.statut==="refuse";});
  var tauxGlobal   = totalObjs>0 ? Math.round(objValides.length/totalObjs*100) : 0;
  var totalPts     = allJeunes.reduce(function(s,j){return s+getPoints(j.id,allObjs);},0);
  var echangesAcc  = allEchanges.filter(function(e){return e.statut==="accordee";});

  // ── Par structure ──────────────────────────────────────────────────────────
  function statsStruct(sId) {
    var jeunes  = allJeunes.filter(function(j){return j.structureId===sId;});
    var educs   = allEducs.filter(function(e){return e.structureId===sId;});
    var objs    = allObjs.filter(function(o){return jeunes.find(function(j){return j.id===o.jeuneId;});});
    var valides = objs.filter(function(o){return o.statut==="valide";});
    var attente = objs.filter(function(o){return o.statut==="attente_valid";});
    var pts     = jeunes.reduce(function(s,j){return s+getPoints(j.id,allObjs);},0);
    var taux    = objs.length>0 ? Math.round(valides.length/objs.length*100) : 0;
    return {jeunes,educs,objs,valides,attente,pts,taux};
  }

  // ── Alertes ────────────────────────────────────────────────────────────────
  var alertes = [];
  if(objAttente.length>0) alertes.push({type:"warn",ico:"⏳",titre:objAttente.length+" objectif"+(objAttente.length>1?"s":"")+" en attente de validation",detail:objAttente.map(function(o){var j=allJeunes.find(function(x){return x.id===o.jeuneId;});return j?j.prenom+" ("+o.titre+")":"";}).filter(Boolean).join(" · ")});
  structures.forEach(function(s){
    var st=statsStruct(s.id);
    if(st.jeunes.length>0 && st.taux<40) alertes.push({type:"danger",ico:"🚨",titre:"Taux de réussite faible — "+s.nom,detail:"Seulement "+st.taux+"% d'objectifs validés sur "+st.objs.length+" objectifs"});
    if(st.jeunes.length>0 && st.educs.length===0) alertes.push({type:"danger",ico:"🚨",titre:"Aucun éducateur — "+s.nom,detail:st.jeunes.length+" jeune"+(st.jeunes.length>1?"s":"")+" sans éducateur rattaché"});
  });
  var jeunesSansObj = allJeunes.filter(function(j){return !allObjs.find(function(o){return o.jeuneId===j.id;});});
  if(jeunesSansObj.length>0) alertes.push({type:"warn",ico:"⚠️",titre:jeunesSansObj.length+" jeune"+(jeunesSansObj.length>1?"s sans objectifs":"")+" sans objectif",detail:jeunesSansObj.map(function(j){return j.prenom+" "+j.nom;}).join(", ")});

  function OngletBtn(op) {
    var act = onglet===op.id;
    return <span role="button" onClick={function(){setOnglet(op.id);}}
      style={{padding:"8px 16px",borderRadius:20,background:act?"#1a6bff":T.bg3,color:act?"#fff":T.tx2,fontSize:13,fontWeight:700,cursor:"pointer",border:"1.5px solid "+(act?"#1a6bff":T.brd2),transition:"all .15s",whiteSpace:"nowrap"}}>
      {op.ico} {op.l}{op.badge>0?" ("+op.badge+")":""}
    </span>;
  }

  function KPI(kp) {
    return <div style={{background:T.bg3,border:"1px solid "+T.brd,borderRadius:14,padding:"14px 16px",borderLeft:"3px solid "+kp.c}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{fontSize:20}}>{kp.ico}</span>
        <span style={{fontSize:28,fontWeight:900,color:kp.c,fontFamily:"'Fredoka One',sans-serif"}}>{kp.v}</span>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:T.tx,marginBottom:2}}>{kp.l}</div>
      {kp.sub && <div style={{fontSize:11,color:T.tx2}}>{kp.sub}</div>}
    </div>;
  }

  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Nunito',sans-serif",color:T.tx,transition:"background .25s"}}>

      {/* Header supervision */}
      <div style={{background:T.bg2,borderBottom:"1px solid "+T.brd,padding:"18px 24px"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:4}}>
          <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#1a6bff,#00c2e0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚖️</div>
          <div>
            <div style={{fontSize:20,fontWeight:800}}>Supervision DT — Objectif+</div>
            <div style={{fontSize:13,color:T.tx2}}>DIRPJJ Grand Est · Vue territoriale consolidée · {p.user.prenom} {p.user.nom}</div>
          </div>
          <ThemeToggle isDark={p.isDark} onToggle={p.onToggleTheme}/>
          <span role="button" onClick={p.onLogout} style={{padding:"7px 16px",borderRadius:9,background:T.bg3,border:"1px solid "+T.brd,color:T.tx2,fontSize:13,cursor:"pointer",userSelect:"none"}}>Déconnexion</span>
        </div>
      </div>

      <div style={{padding:"20px 24px"}}>

        {/* Onglets */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24}}>
          <OngletBtn id="apercu"    ico="🏠" l="Aperçu territorial" badge={0}/>
          <OngletBtn id="jeunes"    ico="👥" l="Jeunes"             badge={0}/>
          <OngletBtn id="objectifs" ico="🎯" l="Objectifs"          badge={0}/>
          <OngletBtn id="cps"       ico="🧠" l="CPS"                badge={0}/>
          <OngletBtn id="alertes"   ico="🚨" l="Alertes"            badge={alertes.length}/>
        </div>

        {/* ── APERÇU ── */}
        {onglet==="apercu" && <div>

          {/* KPIs globaux */}
          <div style={{fontSize:12,fontWeight:700,color:T.tx2,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:12}}>Indicateurs territoriaux</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:28}}>
            <KPI ico="🏛️" v={structures.length}        l="Structures"          c="#1a6bff" sub="sur le territoire"/>
            <KPI ico="👥" v={totalJeunes}               l="Jeunes accompagnés"  c="#8b5cf6" sub={allEducs.length+" éducateurs"}/>
            <KPI ico="🎯" v={totalObjs}                 l="Objectifs au total"  c="#00c2e0" sub={objValides.length+" validés"}/>
            <KPI ico="📈" v={tauxGlobal+"%"}            l="Taux de réussite"    c={tauxGlobal>=60?"#22c55e":tauxGlobal>=40?"#f97316":"#e03a3a"} sub="objectifs validés / total"/>
            <KPI ico="⏳" v={objAttente.length}         l="En attente valid."   c="#eab308" sub="à traiter par les éducateurs"/>
            <KPI ico="🎁" v={echangesAcc.length}        l="Récompenses accord." c="#22c55e" sub="depuis le début"/>
          </div>

          {/* Par structure */}
          <div style={{fontSize:12,fontWeight:700,color:T.tx2,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:12}}>Par structure</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {structures.map(function(s){
              var st=statsStruct(s.id);
              var maxPts=Math.max(1,...structures.map(function(sx){return statsStruct(sx.id).pts;}));
              return <div key={s.id} style={{background:T.bg3,border:"1px solid "+T.brd,borderRadius:14,padding:"16px 18px",borderLeft:"4px solid "+s.couleur}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <span style={{fontSize:22}}>{s.emoji}</span>
                  <div>
                    <div style={{fontSize:15,fontWeight:800}}>{s.nom}</div>
                    <div style={{fontSize:12,color:T.tx2}}>{s.ville} · Dépt. {s.dept}</div>
                  </div>
                  <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
                    {[
                      {v:st.jeunes.length,  l:"jeunes",    c:"#8b5cf6"},
                      {v:st.educs.length,   l:"éducateurs",c:"#1a6bff"},
                      {v:st.taux+"%",       l:"réussite",  c:st.taux>=60?"#22c55e":st.taux>=40?"#f97316":"#e03a3a"},
                      {v:st.pts,            l:"pts total", c:"#eab308"},
                    ].map(function(k,i){
                      return <div key={i} style={{textAlign:"center",background:"rgba(255,255,255,.05)",borderRadius:9,padding:"6px 12px",border:"1px solid "+T.brd}}>
                        <div style={{fontSize:18,fontWeight:800,color:k.c,fontFamily:"'Fredoka One',sans-serif"}}>{k.v}</div>
                        <div style={{fontSize:10,color:T.tx2}}>{k.l}</div>
                      </div>;
                    })}
                  </div>
                </div>
                {/* Barre répartition objectifs */}
                {st.objs.length>0 && <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.tx2,marginBottom:4}}>
                    <span>Répartition des objectifs</span>
                    <span>{st.objs.length} objectifs</span>
                  </div>
                  <div style={{display:"flex",height:8,borderRadius:99,overflow:"hidden",gap:1}}>
                    {[
                      {n:st.valides.length,        c:"#22c55e"},
                      {n:st.attente.length,        c:"#eab308"},
                      {n:st.objs.filter(function(o){return o.statut==="en_cours";}).length, c:"#1a6bff"},
                      {n:st.objs.filter(function(o){return o.statut==="refuse";}).length,   c:"#e03a3a"},
                    ].map(function(seg,i){
                      var pct=Math.round(seg.n/st.objs.length*100);
                      return pct>0 ? <div key={i} style={{width:pct+"%",background:seg.c,transition:"width .5s"}}/> : null;
                    })}
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:5,flexWrap:"wrap"}}>
                    {[["✅ Validés",st.valides.length,"#22c55e"],["⏳ Attente",st.attente.length,"#eab308"],["🔵 En cours",st.objs.filter(function(o){return o.statut==="en_cours";}).length,"#1a6bff"],["❌ Refusés",st.objs.filter(function(o){return o.statut==="refuse";}).length,"#e03a3a"]].map(function(leg,i){
                      return <span key={i} style={{fontSize:11,color:leg[2]}}>{leg[0]} : <strong>{leg[1]}</strong></span>;
                    })}
                  </div>
                </div>}
                {st.objs.length===0 && <div style={{fontSize:12,color:T.tx2,fontStyle:"italic"}}>Aucun objectif enregistré pour cette structure.</div>}
              </div>;
            })}
          </div>
        </div>}

        {/* ── JEUNES ── */}
        {onglet==="jeunes" && <div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <select value={filtStructure} onChange={function(e){setFiltStructure(e.target.value);}} style={{background:T.bg3,border:"1px solid "+T.brd2,borderRadius:9,padding:"7px 12px",fontSize:13,color:T.tx}}>
              <option value="toutes">Toutes les structures</option>
              {structures.map(function(s){return <option key={s.id} value={String(s.id)}>{s.nom}</option>;})}
            </select>
            <span style={{marginLeft:"auto",fontSize:13,color:T.tx2}}>{allJeunes.filter(function(j){return filtStructure==="toutes"||j.structureId===Number(filtStructure);}).length} jeune(s)</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {allJeunes.filter(function(j){return filtStructure==="toutes"||j.structureId===Number(filtStructure);}).map(function(j){
              var pts    = getPoints(j.id,allObjs);
              var niv    = getNiveau(pts);
              var nxtNiv = NIVEAUX.find(function(n){return n.min>pts;});
              var jObjs  = allObjs.filter(function(o){return o.jeuneId===j.id;});
              var struct = structures.find(function(s){return s.id===j.structureId;});
              var educ   = allEducs.find(function(e){return e.structureId===j.structureId;});
              return <div key={j.id} style={{background:T.bg3,border:"1px solid "+T.brd,borderRadius:14,padding:"14px 18px",borderLeft:"4px solid "+j.couleur}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                  <div style={{width:42,height:42,borderRadius:12,background:j.couleur+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:"2px solid "+j.couleur+"66"}}>{j.avatar}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:800}}>{j.prenom}</div>
                    <div style={{fontSize:12,color:T.tx2}}>{j.age} ans · {struct?struct.nom:"?"} {struct?struct.emoji:""}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:24,fontWeight:900,color:"#eab308",fontFamily:"'Fredoka One',sans-serif"}}>{pts} pts</div>
                    <div style={{fontSize:12,color:niv.couleur}}>{niv.ico} {niv.label}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:12}}>
                  {[
                    {l:"✅ "+jObjs.filter(function(o){return o.statut==="valide";}).length+" validés",         c:"#22c55e"},
                    {l:"🔵 "+jObjs.filter(function(o){return o.statut==="en_cours";}).length+" en cours",      c:"#1a6bff"},
                    {l:"⏳ "+jObjs.filter(function(o){return o.statut==="attente_valid";}).length+" en attente",c:"#eab308"},
                    {l:"❌ "+jObjs.filter(function(o){return o.statut==="refuse";}).length+" refusés",          c:"#e03a3a"},
                  ].map(function(t,i){return <span key={i} style={{padding:"3px 10px",borderRadius:20,background:t.c+"22",color:t.c,border:"1px solid "+t.c+"44",fontWeight:700}}>{t.l}</span>;})}
                  {nxtNiv && <span style={{padding:"3px 10px",borderRadius:20,background:"rgba(255,255,255,.05)",color:T.tx2,border:"1px solid "+T.brd2}}>→ {nxtNiv.ico} {nxtNiv.label} dans {nxtNiv.min-pts} pts</span>}
                </div>
              </div>;
            })}
          </div>
        </div>}

        {/* ── OBJECTIFS ── */}
        {onglet==="objectifs" && <div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <select value={filtStructure} onChange={function(e){setFiltStructure(e.target.value);}} style={{background:T.bg3,border:"1px solid "+T.brd2,borderRadius:9,padding:"7px 12px",fontSize:13,color:T.tx}}>
              <option value="toutes">Toutes les structures</option>
              {structures.map(function(s){return <option key={s.id} value={String(s.id)}>{s.nom}</option>;})}
            </select>
            <select value={filtCat} onChange={function(e){setFiltCat(e.target.value);}} style={{background:T.bg3,border:"1px solid "+T.brd2,borderRadius:9,padding:"7px 12px",fontSize:13,color:T.tx}}>
              <option value="toutes">Tous les statuts</option>
              {[["valide","✅ Validés"],["en_cours","🔵 En cours"],["attente_valid","⏳ En attente"],["refuse","❌ Refusés"]].map(function(s){return <option key={s[0]} value={s[0]}>{s[1]}</option>;})}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {allObjs.filter(function(o){
              var j=allJeunes.find(function(x){return x.id===o.jeuneId;});
              if(!j) return false;
              if(filtStructure!=="toutes" && j.structureId!==Number(filtStructure)) return false;
              if(filtCat!=="toutes" && o.statut!==filtCat) return false;
              return true;
            }).map(function(o){
              var j=allJeunes.find(function(x){return x.id===o.jeuneId;});
              var struct=j?structures.find(function(s){return s.id===j.structureId;}):null;
              var cat=CATS.find(function(c){return c.id===o.cat;});
              var statCols={"valide":"#22c55e","en_cours":"#1a6bff","attente_valid":"#eab308","refuse":"#e03a3a"};
              var statLbls={"valide":"✅ Validé","en_cours":"🔵 En cours","attente_valid":"⏳ Attente valid.","refuse":"❌ Refusé"};
              var sc=statCols[o.statut]||T.tx2;
              return <div key={o.id} style={{background:T.bg3,border:"1px solid "+T.brd,borderRadius:12,padding:"12px 16px",borderLeft:"3px solid "+sc}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,marginBottom:5}}>{o.titre}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <span style={{padding:"2px 9px",borderRadius:20,background:sc+"22",color:sc,fontSize:11,fontWeight:700,border:"1px solid "+sc+"44"}}>{statLbls[o.statut]}</span>
                      {cat && <span style={{padding:"2px 9px",borderRadius:20,background:cat.c+"22",color:cat.c,fontSize:11,fontWeight:700,border:"1px solid "+cat.c+"44"}}>{cat.ico} {cat.label}</span>}
                      {j && <span style={{padding:"2px 9px",borderRadius:20,background:"rgba(255,255,255,.05)",color:T.tx2,fontSize:11,border:"1px solid "+T.brd2}}>{j.avatar} {j.prenom}</span>}
                      {struct && <span style={{padding:"2px 9px",borderRadius:20,background:struct.couleur+"22",color:struct.couleur,fontSize:11,border:"1px solid "+struct.couleur+"44"}}>{struct.emoji} {struct.nom}</span>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:20,fontWeight:800,color:"#eab308",fontFamily:"'Fredoka One',sans-serif"}}>{o.pts} pts</div>
                    <div style={{fontSize:11,color:T.tx2}}>Échéance : {o.dateEch}</div>
                  </div>
                </div>
                {o.commentaireJeune && <div style={{marginTop:8,fontSize:12,color:T.tx2,borderLeft:"2px solid #5a7490",paddingLeft:8,fontStyle:"italic"}}>"{o.commentaireJeune}"</div>}
                {o.cps&&o.cps.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                  {o.cps.map(function(cid){var cp=getCPS(cid);return cp?<span key={cid} style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:cp.familleCouleur+"22",color:cp.familleCouleur,border:"1px solid "+cp.familleCouleur+"44",fontWeight:600}}>{cp.ico} {cp.label}</span>:null;})}
                </div>}
              </div>;
            })}
          </div>
        </div>}

        {/* ── CPS TERRITORIAL ── */}
        {onglet==="cps" && <div>
          <div style={{fontSize:18,fontWeight:800,marginBottom:6}}>🧠 Compétences psychosociales — Vue territoriale</div>
          <div style={{fontSize:13,color:T.tx2,marginBottom:20}}>Agrégation des CPS travaillées sur l'ensemble des objectifs du territoire.</div>

          {/* Calcul des scores CPS agrégés par structure */}
          {(function(){
            // Scores globaux
            var scoreGlobal = {};
            CPS_ALL.forEach(function(c){ scoreGlobal[c.id]={total:0,valide:0}; });
            allObjs.forEach(function(o){
              (o.cps||[]).forEach(function(cid){
                if(scoreGlobal[cid]){ scoreGlobal[cid].total++; if(o.statut==="valide") scoreGlobal[cid].valide++; }
              });
            });
            var totalCpsUsage = CPS_ALL.reduce(function(s,c){return s+scoreGlobal[c.id].total;},0);
            var hasCpsData = totalCpsUsage > 0;

            if(!hasCpsData) return <div style={{textAlign:"center",padding:"60px 0"}}>
              <div style={{fontSize:48,marginBottom:12}}>🧠</div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Aucune donnée CPS</div>
              <div style={{fontSize:14,color:T.tx2}}>Les éducateurs doivent rattacher des CPS aux objectifs pour que les données apparaissent ici.</div>
            </div>;

            var maxTotal = Math.max(1, Math.max.apply(null, CPS_ALL.map(function(c){return scoreGlobal[c.id].total;})));

            return <div>
              {/* Vue globale par famille */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14,marginBottom:24}}>
                {CPS_FAMILLES.map(function(fam){
                  var famTotal = fam.items.reduce(function(s,c){return s+scoreGlobal[c.id].total;},0);
                  var famValide = fam.items.reduce(function(s,c){return s+scoreGlobal[c.id].valide;},0);
                  var famTaux = famTotal>0 ? Math.round(famValide/famTotal*100) : 0;
                  return <div key={fam.id} style={{background:T.bg3,border:"1px solid "+fam.couleur+"44",borderRadius:14,padding:"16px",borderTop:"4px solid "+fam.couleur}}>
                    <div style={{fontSize:14,fontWeight:800,color:fam.couleur,marginBottom:4}}>{fam.label}</div>
                    <div style={{display:"flex",gap:10,marginBottom:12}}>
                      <div style={{textAlign:"center",flex:1}}>
                        <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:24,color:fam.couleur}}>{famTotal}</div>
                        <div style={{fontSize:10,color:T.tx3}}>objectifs rattachés</div>
                      </div>
                      <div style={{textAlign:"center",flex:1}}>
                        <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:24,color:"#22c55e"}}>{famTaux}%</div>
                        <div style={{fontSize:10,color:T.tx3}}>taux de validation</div>
                      </div>
                    </div>
                    {fam.items.map(function(c){
                      var sc=scoreGlobal[c.id];
                      if(sc.total===0) return null;
                      var pct=Math.round(sc.valide/sc.total*100);
                      return <div key={c.id} style={{marginBottom:7}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                          <span style={{fontSize:12}}>{c.ico}</span>
                          <span style={{fontSize:11,fontWeight:600,flex:1}}>{c.label}</span>
                          <span style={{fontSize:10,color:fam.couleur,fontWeight:700}}>{sc.valide}/{sc.total}</span>
                        </div>
                        <div style={{height:6,background:T.bg2,borderRadius:99,overflow:"hidden"}}>
                          <div style={{width:(sc.total/maxTotal*100)+"%",height:"100%",background:fam.couleur+"33",borderRadius:99,overflow:"hidden"}}>
                            <div style={{width:pct+"%",height:"100%",background:fam.couleur,borderRadius:99}}/>
                          </div>
                        </div>
                      </div>;
                    })}
                  </div>;
                })}
              </div>

              {/* Top CPS les plus travaillées */}
              <div style={{background:T.bg3,border:"1px solid "+T.brd,borderRadius:14,padding:"16px 20px",marginBottom:20}}>
                <div style={{fontSize:14,fontWeight:800,marginBottom:14}}>🏆 CPS les plus travaillées</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {CPS_ALL
                    .filter(function(c){return scoreGlobal[c.id].total>0;})
                    .sort(function(a,b){return scoreGlobal[b.id].total-scoreGlobal[a.id].total;})
                    .map(function(c,i){
                      var sc=scoreGlobal[c.id];
                      var pct=Math.round(sc.valide/sc.total*100);
                      return <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px",borderRadius:10,background:T.bg2}}>
                        <div style={{width:24,textAlign:"center",fontFamily:"'Fredoka One',sans-serif",fontSize:14,color:i===0?T.yellowL:i===1?T.tx2:T.tx3}}>#{i+1}</div>
                        <span style={{fontSize:16}}>{c.ico}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:700}}>{c.label}</div>
                          <div style={{fontSize:10,color:c.familleCouleur,fontWeight:600}}>{c.familleLabel}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:700,color:c.familleCouleur}}>{sc.total} objectifs</div>
                          <div style={{fontSize:10,color:"#22c55e"}}>{pct}% validés</div>
                        </div>
                      </div>;
                    })
                  }
                </div>
              </div>

              {/* CPS par structure */}
              <div style={{background:T.bg3,border:"1px solid "+T.brd,borderRadius:14,padding:"16px 20px"}}>
                <div style={{fontSize:14,fontWeight:800,marginBottom:14}}>🏛️ CPS par structure</div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {structures.map(function(s){
                    var sJeunes=allJeunes.filter(function(j){return j.structureId===s.id;});
                    var sObjs=allObjs.filter(function(o){return sJeunes.find(function(j){return j.id===o.jeuneId;});});
                    var sCpsCount={};
                    CPS_ALL.forEach(function(c){sCpsCount[c.id]=0;});
                    sObjs.forEach(function(o){(o.cps||[]).forEach(function(cid){if(sCpsCount[cid]!==undefined)sCpsCount[cid]++;});});
                    var topCps=CPS_ALL.filter(function(c){return sCpsCount[c.id]>0;}).sort(function(a,b){return sCpsCount[b.id]-sCpsCount[a.id];}).slice(0,4);
                    if(topCps.length===0) return <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,background:T.bg2,border:"1px solid "+T.brd}}>
                      <span style={{fontSize:20}}>{s.emoji}</span>
                      <span style={{fontSize:13,fontWeight:700,flex:1}}>{s.nom}</span>
                      <span style={{fontSize:11,color:T.tx3}}>Aucune CPS rattachée</span>
                    </div>;
                    return <div key={s.id} style={{padding:"12px 14px",borderRadius:12,background:T.bg2,border:"1px solid "+s.couleur+"33",borderLeft:"4px solid "+s.couleur}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <span style={{fontSize:18}}>{s.emoji}</span>
                        <span style={{fontSize:13,fontWeight:800}}>{s.nom}</span>
                        <span style={{fontSize:11,color:T.tx3,marginLeft:"auto"}}>{sObjs.filter(function(o){return (o.cps||[]).length>0;}).length} obj. avec CPS</span>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {topCps.map(function(c){
                          return <span key={c.id} style={{fontSize:11,padding:"3px 9px",borderRadius:20,background:c.familleCouleur+"22",color:c.familleCouleur,border:"1px solid "+c.familleCouleur+"44",fontWeight:600}}>
                            {c.ico} {c.label} <span style={{opacity:.7}}>×{sCpsCount[c.id]}</span>
                          </span>;
                        })}
                      </div>
                    </div>;
                  })}
                </div>
              </div>
            </div>;
          })()}
        </div>}

        {/* ── ALERTES ── */}
        {onglet==="alertes" && <div>
          {alertes.length===0
            ? <div style={{textAlign:"center",padding:"60px 0"}}>
                <div style={{fontSize:48,marginBottom:12}}>✅</div>
                <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Aucune alerte</div>
                <div style={{fontSize:14,color:T.tx2}}>Tout est en ordre sur le territoire.</div>
              </div>
            : <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {alertes.map(function(a,i){
                  var bc=a.type==="danger"?"#e03a3a":"#eab308";
                  return <div key={i} style={{background:T.bg3,border:"1px solid "+bc+"44",borderLeft:"4px solid "+bc,borderRadius:12,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:a.detail?6:0}}>
                      <span style={{fontSize:20}}>{a.ico}</span>
                      <span style={{fontSize:14,fontWeight:700,color:bc}}>{a.titre}</span>
                    </div>
                    {a.detail && <div style={{fontSize:12,color:T.tx2,paddingLeft:28,lineHeight:1.6}}>{a.detail}</div>}
                  </div>;
                })}
              </div>
          }
        </div>}

      </div>
    </div>
  );
}

function EquipesPanel(p) {
  var T = useTheme();
  var isSuperAdmin = p.currentUser && p.currentUser.role === "superadmin";
  var [sousTab,      setSousTab]      = useState("structures");
  var [confirmSuppr, setConfirmSuppr] = useState(null);
  var [editDroits,   setEditDroits]   = useState(null);
  var [showModalSt,  setShowModalSt]  = useState(false);
  var [resetMdp,        setResetMdp]        = useState(null); // {user, newMdp, showMdp}
  var [localResetCodes, setLocalResetCodes] = useState({}); // {userId: {code, createdAt}}
  var [editLogin, setEditLogin] = useState(null); // {user, newLogin}
  var [confirmSupprUser, setConfirmSupprUser] = useState(null); // user à supprimer
  var [fStruct, setFStruct] = useState({nom:"",ville:"",dept:"",emoji:"🏛️",couleur:T.purple});

  function saveStruct() {
    if(!fStruct.nom||!fStruct.ville){p.nf("Nom et ville obligatoires","error");return;}
    var n={id:Date.now(),nom:fStruct.nom,ville:fStruct.ville,dept:fStruct.dept,emoji:fStruct.emoji,couleur:fStruct.couleur};
    p.setStructures(function(prev){return [...prev,n];});
    setShowModalSt(false);
    p.nf("Structure \""+fStruct.nom+"\" créée !","success");
    setFStruct({nom:"",ville:"",dept:"",emoji:"🏛️",couleur:T.purple});
  }
  function suppStruct(s) {
    var hasPeople=p.users.find(function(x){return x.structureId===s.id;});
    if(hasPeople){p.nf("Impossible : des utilisateurs sont encore rattachés","error");return;}
    p.setStructures(function(prev){return prev.filter(function(x){return x.id!==s.id;});});
    p.nf("Structure supprimée","warn");
    setConfirmSuppr(null);
  }
  function saveDroits(userId, droits) {
    p.setUsers(function(prev){return prev.map(function(u){return u.id===userId?Object.assign({},u,{droits:droits}):u;});});
    p.nf("Droits mis à jour !","success");
    setEditDroits(null);
  }
  function reassignerUser(userId, newStructId) {
    p.setUsers(function(prev){return prev.map(function(u){return u.id===userId?Object.assign({},u,{structureId:Number(newStructId)}):u;});});
    p.nf("Affectation mise à jour","success");
  }
  function supprimerUser(user) {
    if(!p.currentUser||p.currentUser.role!=="superadmin"){p.nf("Seul le super-administrateur peut supprimer des comptes","error");return;}
    if(user.id===p.currentUser.id){p.nf("Impossible de supprimer votre propre compte","error");return;}
    setConfirmSupprUser(user);
  }
  function confirmerSupprUser() {
    if(!confirmSupprUser) return;
    var uid = confirmSupprUser.id;
    fetch("/api/users/"+uid, {method:"DELETE", headers:{"Authorization":"Bearer "+getToken()}})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok || d.success){
          p.setUsers(function(prev){return prev.filter(function(u){return u.id!==uid;});});
          p.nf("Compte supprimé","warn");
        } else {
          p.nf(d.error||"Erreur lors de la suppression","error");
        }
        setConfirmSupprUser(null);
      })
      .catch(function(){p.nf("Erreur réseau","error"); setConfirmSupprUser(null);});
  }
  function sauvegarderLogin() {
    if(!editLogin||!editLogin.newLogin.trim()){p.nf("Identifiant vide","error");return;}
    var nl=editLogin.newLogin.trim().toLowerCase();
    if(p.users.some(function(x){return x.id!==editLogin.user.id&&x.login.toLowerCase()===nl;})){p.nf("Cet identifiant est déjà utilisé","error");return;}
    p.setUsers(function(prev){return prev.map(function(u){return u.id===editLogin.user.id?Object.assign({},u,{login:nl}):u;});});
    p.nf("✏️ Identifiant modifié !","success");
    setEditLogin(null);
  }
  function confirmerResetMdp() {
    if(!resetMdp||!resetMdp.newMdp||resetMdp.newMdp.length<6){p.nf("Le mot de passe doit faire au moins 6 caractères","error");return;}
    apiPost("/api/users/"+resetMdp.user.id+"/set-password",{newMdp:resetMdp.newMdp}).then(function(data){
      if(data.ok){p.nf("🔑 Mot de passe réinitialisé pour "+resetMdp.user.prenom+" !","success");setResetMdp(null);}
      else{p.nf(data.error||"Erreur","error");}
    }).catch(function(){p.nf("Impossible de contacter le serveur.","error");});
  }

  return <div>
    {/* Sous-onglets + bouton action */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[
          {k:"structures",ico:"🏛️",l:"Structures"},
          {k:"educateurs", ico:"👨‍🏫",l:"Éducateurs & droits"},
          {k:"comptes",    ico:"🔐",l:"Comptes jeunes"},
        ].map(function(t){
          var act=sousTab===t.k;
          return <span key={t.k} role="button" onClick={function(){setSousTab(t.k);}} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:50,background:act?T.purple:"transparent",color:act?"#fff":T.tx2,fontSize:12,fontWeight:700,cursor:"pointer",border:"1.5px solid "+(act?T.purple:T.brd),transition:"all .2s"}}>{t.ico} {t.l}</span>;
        })}
      </div>
      {sousTab==="structures" && <Btn onClick={function(){setShowModalSt(true);}}>+ Nouvelle structure</Btn>}
      {sousTab==="educateurs" && <Btn onClick={function(){p.onAddEducateur();}}>+ Ajouter éducateur</Btn>}
      {sousTab==="comptes"    && <Btn onClick={function(){p.onAddJeune();}}>+ Nouveau jeune</Btn>}
    </div>

    {/* ─ Structures ─ */}
    {sousTab==="structures" && <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {p.structures.map(function(s){
        var sEducs=p.users.filter(function(x){return x.role==="educateur"&&x.structureId===s.id;});
        var sJeunes=p.users.filter(function(x){return x.role==="jeune"&&x.structureId===s.id;});
        return <Card key={s.id} style={{borderLeft:"4px solid "+s.couleur}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <div style={{width:50,height:50,borderRadius:13,background:s.couleur+"30",border:"2px solid "+s.couleur,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{s.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:800}}>{s.nom}</div>
              <div style={{fontSize:12,color:T.tx2}}>{s.ville}{s.dept?" · Dépt. "+s.dept:""}</div>
            </div>
            <Pill c={T.blue}>{sEducs.length} éducateurs</Pill>
            <Pill c={T.purple}>{sJeunes.length} jeunes</Pill>
            <Btn sm bg={T.red} onClick={function(){setConfirmSuppr(s);}}>🗑 Supprimer</Btn>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div style={{background:T.bg3,borderRadius:10,padding:10}}>
              <div style={{fontSize:11,color:T.tx3,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Éducateurs</div>
              {sEducs.length===0 && <div style={{fontSize:12,color:T.tx3,fontStyle:"italic"}}>Aucun</div>}
              {sEducs.map(function(e){return <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid "+T.brd}}>
                <span>{e.avatar}</span><span style={{fontSize:13,fontWeight:600}}>{e.prenom} {e.nom}</span>
              </div>;})}
            </div>
            <div style={{background:T.bg3,borderRadius:10,padding:10}}>
              <div style={{fontSize:11,color:T.tx3,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Jeunes</div>
              {sJeunes.length===0 && <div style={{fontSize:12,color:T.tx3,fontStyle:"italic"}}>Aucun</div>}
              {sJeunes.map(function(j){return <div key={j.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid "+T.brd}}>
                <span>{j.avatar}</span>
