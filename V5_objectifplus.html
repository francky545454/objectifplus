                <span style={{fontSize:13,fontWeight:600}}>{j.prenom}</span>
                <span style={{fontSize:11,color:T.tx3,marginLeft:"auto"}}>{getPoints(j.id,p.objectifs)} pts</span>
              </div>;})}
            </div>
          </div>
        </Card>;
      })}
    </div>}

    {/* ─ Éducateurs & droits ─ */}
    {sousTab==="educateurs" && <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {p.users.filter(function(x){return x.role==="educateur";}).map(function(edu){
        var st=p.structures.find(function(s){return s.id===edu.structureId;});
        var droits=edu.droits||DROITS_DEF;
        var nbDroits=Object.keys(droits).filter(function(k){return droits[k];}).length;
        return <Card key={edu.id}>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <Ava size={44} ico={edu.avatar} c={edu.couleur||T.blue}/>
            <div style={{flex:1,minWidth:120}}>
              <div style={{fontSize:15,fontWeight:800}}>{edu.prenom} {edu.nom}</div>
              <div style={{fontSize:12,color:T.tx2}}>🔑 {edu.login} · {nbDroits}/{DROITS_LABELS.length} droits</div>
            </div>
            {st && <Pill c={st.couleur}>{st.emoji} {st.nom}</Pill>}
            <Sel value={edu.structureId||""} onChange={function(e){reassignerUser(edu.id,e.target.value);}} style={{width:170,fontSize:12,padding:"5px 8px"}}>
              {p.structures.map(function(s){return <option key={s.id} value={s.id}>{s.emoji} {s.nom}</option>;})}
            </Sel>
            <Btn sm bg={T.purple} onClick={function(){setEditDroits({user:edu,droits:Object.assign({},DROITS_DEF,edu.droits||{})});}}>⚙️ Droits</Btn>
            <Btn sm bg={T.teal} onClick={function(){setResetMdp({user:edu,newMdp:"",showMdp:false});}}>🔑 MDP</Btn>
            <Btn sm bg="#6366f1" onClick={function(){setEditLogin({user:edu,newLogin:edu.login});}}>✏️ Login</Btn>
            {isSuperAdmin && <Btn sm bg={T.red} onClick={function(){supprimerUser(edu);}}>🗑</Btn>}
          </div>
          <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:5}}>
            {DROITS_LABELS.map(function(d){
              var on=droits[d.k];
              return <span key={d.k} style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:on?T.green+"22":T.bg3,color:on?T.greenL:T.tx3,border:"1px solid "+(on?T.green+"44":T.brd)}}>{d.ico} {d.l}</span>;
            })}
          </div>
        </Card>;
      })}
    </div>}

    {/* ─ Comptes jeunes ─ */}
    {sousTab==="comptes" && <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {p.users.filter(function(x){return x.role==="jeune";}).map(function(j){
        var st=p.structures.find(function(s){return s.id===j.structureId;});
        var token = localResetCodes[j.id];
        var tokenActif = token && (Date.now()-token.createdAt < 30*60*1000);
        return <Card key={j.id}>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <Ava size={40} ico={j.avatar} c={j.couleur}/>
            <div style={{flex:1,minWidth:120}}>
              <div style={{fontSize:14,fontWeight:800}}>{j.prenom}{j.age?" · "+j.age+" ans":""}</div>
              <div style={{fontSize:12,color:T.tx2}}>🔑 {j.login} · {getPoints(j.id,p.objectifs)} pts · {getNiveau(getPoints(j.id,p.objectifs)).ico}</div>
              {tokenActif && <div style={{fontSize:11,color:T.tealL,marginTop:2,fontFamily:"monospace",fontWeight:700}}>Code actif : {token.code}</div>}
            </div>
            {st && <Pill c={st.couleur}>{st.emoji} {st.nom}</Pill>}
            <Sel value={j.structureId||""} onChange={function(e){reassignerUser(j.id,e.target.value);}} style={{width:150,fontSize:12,padding:"5px 8px"}}>
              {p.structures.map(function(s){return <option key={s.id} value={s.id}>{s.emoji} {s.nom}</option>;})}
            </Sel>
            <Btn sm bg={T.teal} onClick={function(){
              apiPost("/api/users/"+j.id+"/gen-reset-code",{}).then(function(data){
                if(data.ok){setLocalResetCodes(function(prev){return Object.assign({},prev,{[j.id]:{code:data.code,createdAt:Date.now()}});});p.nf("Code pour "+j.prenom+" : "+data.code,"info");}
                else{p.nf(data.error||"Erreur","error");}
              });
            }}>
              {tokenActif?"🔄 Nouveau code":"🔑 Générer code"}
            </Btn>
            <Btn sm bg={T.orange} onClick={function(){setResetMdp({user:j,newMdp:"",showMdp:false});}}>✏️ MDP</Btn>
            <Btn sm bg="#6366f1" onClick={function(){setEditLogin({user:j,newLogin:j.login});}}>✏️ Login</Btn>
            {isSuperAdmin && <Btn sm bg={T.red} onClick={function(){supprimerUser(j);}}>🗑</Btn>}
          </div>
        </Card>;
      })}
    </div>}

    {/* Modal confirmation suppression utilisateur */}
    {confirmSupprUser && <Modal onClose={function(){setConfirmSupprUser(null);}} w={420}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
        <div style={{fontSize:17,fontWeight:800,marginBottom:8}}>
          Supprimer {confirmSupprUser.prenom} {confirmSupprUser.nom||""}  ?
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:12}}>
          <div style={{width:44,height:44,borderRadius:12,background:confirmSupprUser.couleur+"22",border:"2px solid "+(confirmSupprUser.couleur||"#888"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{confirmSupprUser.avatar}</div>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:13,fontWeight:700}}>{confirmSupprUser.prenom} {confirmSupprUser.nom||""}</div>
            <div style={{fontSize:12,color:"#94a3b8"}}>🔑 {confirmSupprUser.login} · {confirmSupprUser.role}</div>
          </div>
        </div>
        <div style={{background:"#ef444415",border:"1px solid #ef444430",borderRadius:8,padding:"8px 12px",marginBottom:18,fontSize:12,color:"#f87171"}}>
          ⚠️ Cette suppression est <strong>définitive et irréversible</strong>.<br/>
          Tous les objectifs liés à ce profil resteront dans la base.
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <Btn ghost color="#94a3b8" brdC="#e2e8f0" onClick={function(){setConfirmSupprUser(null);}}>Annuler</Btn>
          <Btn bg="#ef4444" onClick={confirmerSupprUser}>🗑 Supprimer définitivement</Btn>
        </div>
      </div>
    </Modal>}

    {/* Modal confirmation suppression structure */}
    {confirmSuppr && <Modal onClose={function(){setConfirmSuppr(null);}} w={400}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
        <div style={{fontSize:17,fontWeight:800,marginBottom:8}}>Supprimer "{confirmSuppr.nom}" ?</div>
        <div style={{fontSize:13,color:T.tx2,marginBottom:18}}>Irréversible. Réaffectez d'abord les utilisateurs rattachés.</div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setConfirmSuppr(null);}}>Annuler</Btn>
          <Btn bg={T.red} onClick={function(){suppStruct(confirmSuppr);}}>🗑 Confirmer</Btn>
        </div>
      </div>
    </Modal>}

    {/* Modal droits éducateur */}
    {editDroits && <Modal onClose={function(){setEditDroits(null);}} w={540}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
        <Ava size={46} ico={editDroits.user.avatar} c={editDroits.user.couleur||T.blue}/>
        <div>
          <div style={{fontSize:17,fontWeight:800}}>Droits de {editDroits.user.prenom}</div>
          <div style={{fontSize:12,color:T.tx2}}>Coche les actions autorisées</div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
        {DROITS_LABELS.map(function(d){
          var on=editDroits.droits[d.k];
          return <div key={d.k} role="button" onClick={function(){setEditDroits(function(prev){var nd=Object.assign({},prev.droits);nd[d.k]=!nd[d.k];return Object.assign({},prev,{droits:nd});});}} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,background:on?T.green+"18":T.bg3,border:"1.5px solid "+(on?T.green+"55":T.brd),cursor:"pointer",transition:"all .15s"}}>
            <div style={{width:22,height:22,borderRadius:6,background:on?T.greenL:"transparent",border:"2px solid "+(on?T.greenL:T.tx3),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{on?"✓":""}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:on?T.tx:"#94a3b8"}}>{d.ico} {d.l}</div>
              <div style={{fontSize:11,color:T.tx3,marginTop:1}}>{d.desc}</div>
            </div>
          </div>;
        })}
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:12,color:T.tx3,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Préréglages rapides</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {[
            {l:"Référent complet",  c:T.purple, d:{creerObjectifs:true,validerObjectifs:true,voirTousJeunes:true,gererRecompenses:true,accorderRecompenses:true,exportStats:true,modifierProfils:true}},
            {l:"Éducateur standard",c:T.blue,   d:{creerObjectifs:true,validerObjectifs:true,voirTousJeunes:false,gererRecompenses:true,accorderRecompenses:true,exportStats:false,modifierProfils:false}},
            {l:"Stagiaire",         c:T.teal,   d:{creerObjectifs:true,validerObjectifs:false,voirTousJeunes:false,gererRecompenses:false,accorderRecompenses:false,exportStats:false,modifierProfils:false}},
            {l:"Lecture seule",     c:T.tx3,    d:{creerObjectifs:false,validerObjectifs:false,voirTousJeunes:false,gererRecompenses:false,accorderRecompenses:false,exportStats:false,modifierProfils:false}},
          ].map(function(pr){
            return <Btn key={pr.l} sm ghost color={pr.c} brdC={pr.c} onClick={function(){setEditDroits(function(prev){return Object.assign({},prev,{droits:pr.d});});}}>{pr.l}</Btn>;
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setEditDroits(null);}}>Annuler</Btn>
        <Btn bg={T.purple} style={{flex:1,justifyContent:"center"}} onClick={function(){saveDroits(editDroits.user.id,editDroits.droits);}}>✓ Enregistrer les droits</Btn>
      </div>
    </Modal>}

    {/* Modal nouvelle structure */}
    {showModalSt && <Modal onClose={function(){setShowModalSt(false);}} w={460}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>🏛️ Nouvelle structure</div>
      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        <div><div style={{fontSize:13,color:T.tx2,marginBottom:5,fontWeight:600}}>Nom *</div><Inp value={fStruct.nom} onChange={function(e){setFStruct(function(f){return Object.assign({},f,{nom:e.target.value});});}} placeholder="Ex: UEMO Metz Centre"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><div style={{fontSize:13,color:T.tx2,marginBottom:5,fontWeight:600}}>Ville *</div><Inp value={fStruct.ville} onChange={function(e){setFStruct(function(f){return Object.assign({},f,{ville:e.target.value});});}} placeholder="Metz"/></div>
          <div><div style={{fontSize:13,color:T.tx2,marginBottom:5,fontWeight:600}}>Département</div><Inp value={fStruct.dept} onChange={function(e){setFStruct(function(f){return Object.assign({},f,{dept:e.target.value});});}} placeholder="57"/></div>
        </div>
        <div>
          <div style={{fontSize:13,color:T.tx2,marginBottom:7,fontWeight:600}}>Emoji</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {EMOJIS_ST.map(function(em){return <span key={em} role="button" onClick={function(){setFStruct(function(f){return Object.assign({},f,{emoji:em});});}} style={{width:36,height:36,borderRadius:9,background:fStruct.emoji===em?T.purple+"44":T.bg3,border:"2px solid "+(fStruct.emoji===em?T.purple:T.brd),display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer"}}>{em}</span>;})}
          </div>
        </div>
        <div>
          <div style={{fontSize:13,color:T.tx2,marginBottom:7,fontWeight:600}}>Couleur</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {COLS_ST.map(function(c){return <span key={c} role="button" onClick={function(){setFStruct(function(f){return Object.assign({},f,{couleur:c});});}} style={{width:28,height:28,borderRadius:"50%",background:c,border:"3px solid "+(fStruct.couleur===c?"#fff":"transparent"),cursor:"pointer"}}/>;})}
          </div>
        </div>
        {fStruct.nom && <div style={{background:T.bg3,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:10,background:fStruct.couleur+"33",border:"2px solid "+fStruct.couleur,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{fStruct.emoji}</div>
          <div>
            <div style={{fontSize:14,fontWeight:800}}>{fStruct.nom}</div>
            <div style={{fontSize:12,color:T.tx2}}>{fStruct.ville}{fStruct.dept?" · Dépt. "+fStruct.dept:""}</div>
          </div>
        </div>}
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setShowModalSt(false);}}>Annuler</Btn>
          <Btn bg={T.purple} style={{flex:1,justifyContent:"center"}} onClick={saveStruct}>✓ Créer la structure</Btn>
        </div>
      </div>
    </Modal>}

    {/* Modal modification identifiant */}
    {editLogin && <Modal onClose={function(){setEditLogin(null);}} w={420}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <div style={{width:52,height:52,borderRadius:14,background:"#6366f130",border:"2px solid #6366f1",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{editLogin.user.avatar}</div>
        <div>
          <div style={{fontSize:17,fontWeight:800}}>Modifier l'identifiant</div>
          <div style={{fontSize:13,color:T.tx2}}>{editLogin.user.prenom} {editLogin.user.nom||""} · <span style={{color:"#6366f1"}}>🔑 {editLogin.user.login}</span></div>
        </div>
      </div>
      <div style={{background:"#6366f115",border:"1px solid #6366f144",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#a5b4fc"}}>
        ℹ️ Seul l'identifiant de connexion sera modifié. Le mot de passe et toutes les données sont conservées.
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Nouvel identifiant *</div>
        <Inp value={editLogin.newLogin} onChange={function(e){setEditLogin(function(prev){return Object.assign({},prev,{newLogin:e.target.value});});}} placeholder="ex: m.lefebvre"/>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setEditLogin(null);}}>Annuler</Btn>
        <Btn bg="#6366f1" style={{flex:1,justifyContent:"center"}} onClick={sauvegarderLogin}>✏️ Enregistrer l'identifiant</Btn>
      </div>
    </Modal>}

    {/* Modal réinitialisation mot de passe */}
    {resetMdp && <Modal onClose={function(){setResetMdp(null);}} w={420}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <div style={{width:52,height:52,borderRadius:14,background:T.teal+"30",border:"2px solid "+T.teal,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{resetMdp.user.avatar}</div>
        <div>
          <div style={{fontSize:17,fontWeight:800}}>Réinitialiser le mot de passe</div>
          <div style={{fontSize:13,color:T.tx2}}>{resetMdp.user.prenom} · <span style={{color:T.teal}}>🔑 {resetMdp.user.login}</span></div>
        </div>
      </div>
      <div style={{background:T.teal+"15",border:"1px solid "+T.teal+"44",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:T.tealL}}>
        ℹ️ Seul le mot de passe sera modifié. Toutes les données (objectifs, points, badges) sont conservées.
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,color:T.tx2,marginBottom:6,fontWeight:600}}>Nouveau mot de passe *</div>
        <div style={{position:"relative"}}>
          <Inp
            type={resetMdp.showMdp?"text":"password"}
            value={resetMdp.newMdp}
            onChange={function(e){setResetMdp(function(r){return Object.assign({},r,{newMdp:e.target.value});});}}
            placeholder="Minimum 6 caractères"
            style={{paddingRight:42}}
          />
          <span className="pw-toggle" onClick={function(){setResetMdp(function(r){return Object.assign({},r,{showMdp:!r.showMdp});});}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:T.tx3,fontSize:16,transition:"color .15s",userSelect:"none"}}>{resetMdp.showMdp?"🙈":"👁️"}</span>
        </div>
        {resetMdp.newMdp.length>0 && resetMdp.newMdp.length<6 && <div style={{fontSize:11,color:T.redL,marginTop:5}}>⚠️ Au moins 6 caractères requis</div>}
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setResetMdp(null);}}>Annuler</Btn>
        <Btn bg={T.teal} style={{flex:1,justifyContent:"center"}} disabled={!resetMdp.newMdp||resetMdp.newMdp.length<6} onClick={confirmerResetMdp}>🔑 Réinitialiser le mot de passe</Btn>
      </div>
    </Modal>}
  </div>;
}

// ── Bibliothèque d'objectifs (composant) ─────────────────────────────────────
function BiblioPanel(p) {
  var T = useTheme();
  var [filtCat,   setFiltCat]   = useState(CATS[0].id);
  var [filtNiv,   setFiltNiv]   = useState(0);
  var [recherche, setRecherche] = useState("");

  var NIVEAU_COLS   = {1:"#15803d", 2:"#b45309", 3:"#7c3aed"};
  var NIVEAU_LABELS = {1:"🟢 Accessible", 2:"🟡 Intermédiaire", 3:"🔴 Ambitieux"};

  var catObj     = CATS.find(function(c){return c.id===filtCat;})||CATS[0];
  var objsFiltres = (BIBLIO_OBJECTIFS[filtCat]||[]).filter(function(o){
    if(filtNiv>0 && o.n!==filtNiv) return false;
    if(recherche && o.titre.toLowerCase().indexOf(recherche.toLowerCase())<0) return false;
    return true;
  });
  var totalBiblio = Object.values(BIBLIO_OBJECTIFS).reduce(function(s,arr){return s+arr.length;},0);

  function utiliser(o) {
    p.setFObj(function(f){return Object.assign({},f,{titre:o.titre,cat:filtCat,pts:o.pts,cps:[]});});
    p.setTab("jeunes");
    p.setModal("obj");
    p.nf("📖 Objectif pré-rempli — complète les champs restants","info");
  }

  return <div className="fu">
    <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>📖 Bibliothèque d'objectifs PJJ</div>
    <div style={{fontSize:13,color:T.tx2,marginBottom:18}}>
      {totalBiblio} objectifs répartis sur {CATS.length} catégories · Cliquez sur un objectif pour le pré-remplir dans le formulaire de création.
    </div>

    {/* Filtres catégories */}
    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {CATS.map(function(c){
          var act = filtCat===c.id;
          return <span key={c.id} role="button"
            onClick={function(){setFiltCat(c.id);setRecherche("");}}
            style={{display:"inline-flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:50,
              background:act?c.c+"33":T.bg3, color:act?c.c:T.tx2,
              border:"1.5px solid "+(act?c.c:T.brd),
              fontSize:12,fontWeight:700,cursor:"pointer",transition:"all .2s"}}>
            {c.ico} {c.label}
            <span style={{background:act?c.c+"44":T.bg2,borderRadius:20,padding:"1px 6px",fontSize:10}}>
              {(BIBLIO_OBJECTIFS[c.id]||[]).length}
            </span>
          </span>;
        })}
      </div>

      {/* Filtres niveau + recherche */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {[0,1,2,3].map(function(n){
          var act = filtNiv===n;
          var col = n===0 ? T.tx2 : NIVEAU_COLS[n];
          var lbl = n===0 ? "Tous niveaux" : NIVEAU_LABELS[n];
          return <span key={n} role="button" onClick={function(){setFiltNiv(n);}}
            style={{padding:"5px 12px",borderRadius:50,
              background:act?(n===0?T.bg3:NIVEAU_COLS[n]+"33"):T.bg3,
              color:act?col:T.tx3,
              border:"1.5px solid "+(act?col:T.brd),
              fontSize:12,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>{lbl}</span>;
        })}
        <input value={recherche} onChange={function(e){setRecherche(e.target.value);}}
          placeholder="🔍 Rechercher un objectif..."
          style={{flex:1,minWidth:180,background:T.bg3,border:"1.5px solid "+T.brd2,
            borderRadius:10,padding:"7px 12px",fontSize:13,color:T.tx,fontFamily:FONT}}/>
      </div>
    </div>

    {/* En-tête catégorie active */}
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,padding:"12px 16px",
      background:catObj.c+"18",border:"1.5px solid "+catObj.c+"44",borderRadius:12}}>
      <span style={{fontSize:28}}>{catObj.ico}</span>
      <div>
        <div style={{fontSize:15,fontWeight:800,color:catObj.c}}>{catObj.label}</div>
        <div style={{fontSize:12,color:T.tx3}}>
          {objsFiltres.length} objectif{objsFiltres.length>1?"s":""} affiché{objsFiltres.length>1?"s":""}
        </div>
      </div>
    </div>

    {/* Liste par niveau */}
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {objsFiltres.length===0 && <div style={{textAlign:"center",padding:30,color:T.tx3}}>Aucun objectif trouvé.</div>}
      {[1,2,3].map(function(niv){
        var items = objsFiltres.filter(function(o){return o.n===niv;});
        if(items.length===0) return null;
        var col = NIVEAU_COLS[niv];
        return <div key={niv} style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:col,textTransform:"uppercase",
            letterSpacing:1,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
            {NIVEAU_LABELS[niv]}
            <span style={{background:col+"22",color:col,borderRadius:20,padding:"1px 8px",fontSize:10}}>{items.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {items.map(function(o,i){
              return <div key={i} role="button" onClick={function(){utiliser(o);}}
                style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",
                  borderRadius:10,background:T.card,border:"1px solid "+T.brd,
                  cursor:"pointer",transition:"all .15s",borderLeft:"3px solid "+col}}
                onMouseEnter={function(e){e.currentTarget.style.background=col+"0d";e.currentTarget.style.borderColor=col;}}
                onMouseLeave={function(e){e.currentTarget.style.background=T.card;e.currentTarget.style.borderColor=T.brd;}}>
                <span style={{fontSize:16,flexShrink:0}}>{catObj.ico}</span>
                <span style={{flex:1,fontSize:13,color:T.tx}}>{o.titre}</span>
                <span style={{fontFamily:"'Fredoka One',sans-serif",fontSize:16,color:col,flexShrink:0}}>{o.pts}</span>
                <span style={{fontSize:10,color:T.tx3,flexShrink:0}}>pts</span>
                <span style={{fontSize:11,color:col,fontWeight:700,flexShrink:0}}>Utiliser →</span>
              </div>;
            })}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── Système de tickets éducateur → admin ─────────────────────────────────────
function TicketsPanel(p) {
  var T = useTheme();
  var u = p.currentUser;
  var isAdmin = u.role==="admin"||u.role==="superadmin";
  var [mode,         setMode]         = useState("list");
  var [fTicket,      setFTicket]      = useState({titre:"",message:"",priorite:"normale"});
  var [reponseModal, setReponseModal] = useState(null);

  var myTickets = isAdmin ? p.tickets : p.tickets.filter(function(t){return t.educateurId===u.id;});
  var sorted    = myTickets.slice().sort(function(a,b){return b.id-a.id;});

  var SCOL = {ouvert:T.orange, traite:T.green, ferme:T.tx3};
  var SLBL = {ouvert:"🟠 Ouvert", traite:"✅ Traité", ferme:"🔒 Fermé"};

  function creerTicket() {
    if(!fTicket.titre.trim()||!fTicket.message.trim()){p.nf("Titre et message obligatoires","error");return;}
    apiPost("/api/tickets",{titre:fTicket.titre.trim(),message:fTicket.message.trim(),priorite:fTicket.priorite}).then(function(data){
      if(data.ok){
        p.setTickets(function(prev){return [...prev,data.ticket];});
        p.nf("Ticket envoyé à l'administrateur ✅","success");
        setMode("list"); setFTicket({titre:"",message:"",priorite:"normale"});
      } else {
        p.nf(data.error||"Erreur lors de l'envoi","error");
      }
    }).catch(function(){p.nf("Impossible de contacter le serveur","error");});
  }
  function changerStatut(id,statut){
    p.setTickets(function(prev){return prev.map(function(t){return t.id===id?Object.assign({},t,{statut:statut}):t;});});
  }
  function enregistrerReponse(){
    if(!reponseModal.texte.trim()){p.nf("La réponse est vide","error");return;}
    p.setTickets(function(prev){return prev.map(function(t){
      return t.id===reponseModal.ticket.id
        ?Object.assign({},t,{reponse:reponseModal.texte.trim(),reponseDate:new Date().toISOString(),statut:"traite"})
        :t;
    });});
    p.nf("Réponse envoyée ✅","success"); setReponseModal(null);
  }

  if(mode==="new") return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <Btn ghost color={T.tx2} brdC={T.brd} sm onClick={function(){setMode("list");}}>← Retour</Btn>
        <div style={{fontSize:16,fontWeight:800}}>Nouveau ticket</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:T.tx2,marginBottom:5}}>Titre *</div>
          <Inp value={fTicket.titre} onChange={function(e){setFTicket(function(f){return Object.assign({},f,{titre:e.target.value});});}} placeholder="Décris brièvement ta demande ou le problème"/>
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:T.tx2,marginBottom:5}}>Message *</div>
          <textarea value={fTicket.message} onChange={function(e){setFTicket(function(f){return Object.assign({},f,{message:e.target.value});});}} placeholder="Décris en détail..." style={{width:"100%",minHeight:110,background:T.bg3,border:"1.5px solid "+T.brd2,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.tx,resize:"vertical",fontFamily:FONT}}/>
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:T.tx2,marginBottom:5}}>Priorité</div>
          <div style={{display:"flex",gap:8}}>
            {[{v:"normale",l:"🔵 Normale"},{v:"urgente",l:"🔴 Urgente"}].map(function(pr){
              var sel=fTicket.priorite===pr.v;
              return <Btn key={pr.v} sm ghost={!sel} bg={sel?(pr.v==="urgente"?T.red:T.blue):undefined}
                color={sel?"#fff":T.tx2} brdC={sel?(pr.v==="urgente"?T.red:T.blue):T.brd}
                onClick={function(){setFTicket(function(f){return Object.assign({},f,{priorite:pr.v});});}}>{pr.l}</Btn>;
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setMode("list");}}>Annuler</Btn>
          <Btn bg={T.purple} style={{flex:1,justifyContent:"center"}} onClick={creerTicket}>📨 Envoyer à l'administrateur</Btn>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:800}}>{isAdmin?"📋 Tickets reçus":"🎫 Mes tickets"}</div>
        {!isAdmin && <Btn bg={T.purple} sm onClick={function(){setMode("new");}}>＋ Nouveau ticket</Btn>}
      </div>
      {sorted.length===0 && <div style={{textAlign:"center",padding:"40px 20px",color:T.tx3}}>
        <div style={{fontSize:40,marginBottom:10}}>📭</div>
        <div style={{fontWeight:600}}>{isAdmin?"Aucun ticket reçu":"Aucun ticket envoyé"}</div>
        {!isAdmin && <div style={{fontSize:13,marginTop:6}}>Utilise le bouton ci-dessus pour contacter l'administrateur</div>}
      </div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {sorted.map(function(t){
          var edu=p.users.find(function(x){return x.id===t.educateurId;});
          var df=function(d){return new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});};
          return <Card key={t.id} style={{borderLeft:"4px solid "+(t.priorite==="urgente"?T.red:T.blue)}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                  <Pill c={SCOL[t.statut]||T.tx3}>{SLBL[t.statut]||t.statut}</Pill>
                  {t.priorite==="urgente"&&<Pill c={T.red}>🔴 Urgent</Pill>}
                </div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{t.titre}</div>
                {isAdmin&&edu&&<div style={{fontSize:12,color:T.tx3}}>👤 {edu.prenom} {edu.nom} — {df(t.date)}</div>}
                {!isAdmin&&<div style={{fontSize:12,color:T.tx3}}>{df(t.date)}</div>}
              </div>
            </div>

              <div style={{fontSize:11,color:T.tx3,marginTop:4}}>{df(t.reponseDate)}</div>
            </div>}
            {isAdmin&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
              <Btn sm bg={T.teal} onClick={function(){setReponseModal({ticket:t,texte:t.reponse||""});}}>💬 Répondre</Btn>
              {t.statut==="ouvert"&&<Btn sm bg={T.green} onClick={function(){changerStatut(t.id,"traite");}}>✅ Marquer traité</Btn>}
              {t.statut!=="ferme"&&<Btn sm ghost color={T.tx3} brdC={T.brd} onClick={function(){changerStatut(t.id,"ferme");}}>🔒 Fermer</Btn>}
            </div>}
          </Card>;
        })}
      </div>
      {reponseModal&&<Modal onClose={function(){setReponseModal(null);}} w={480}>
        <div style={{fontSize:17,fontWeight:800,marginBottom:14}}>💬 Répondre au ticket</div>
        <div style={{fontSize:13,color:T.tx2,background:T.bg3,borderRadius:8,padding:"8px 12px",marginBottom:14}}>
          <strong>{reponseModal.ticket.titre}</strong>
          <div style={{marginTop:4,fontSize:12,color:T.tx3}}>{reponseModal.ticket.message.slice(0,150)}{reponseModal.ticket.message.length>150?"…":""}</div>
        </div>
        <textarea value={reponseModal.texte} onChange={function(e){setReponseModal(function(s){return Object.assign({},s,{texte:e.target.value});});}} placeholder="Votre réponse..." style={{width:"100%",minHeight:120,background:T.bg3,border:"1.5px solid "+T.brd2,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.tx,resize:"vertical",fontFamily:FONT}}/>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <Btn ghost color={T.tx2} brdC={T.brd} onClick={function(){setReponseModal(null);}}>Annuler</Btn>
          <Btn bg={T.teal} style={{flex:1,justifyContent:"center"}} onClick={enregistrerReponse}>✅ Envoyer la réponse</Btn>
        </div>
      </Modal>}
    </div>
  );
}

                          <div style={{fontFamily:"monospace",fontSize:15,fontWeight:900,color:T.tealL,letterSpacing:2,background:T.bg3,borderRadius:7,padding:"6px 10px",textAlign:"center",marginBottom:8}}>{token.code}</div>
                          <div style={{fontSize:10,color:T.tx3,marginBottom:6}}>Communique ce code au jeune pour qu'il puisse changer son mot de passe depuis l'écran de connexion.</div>
                          <Btn sm ghost color={T.teal} brdC={T.teal} style={{width:"100%",justifyContent:"center"}} onClick={genCode}>🔄 Regénérer</Btn>
                        </div>
                      : <div>
                          <div style={{fontSize:11,color:T.tx3,marginBottom:8}}>Génère un code temporaire à transmettre au jeune.</div>
                          <Btn sm bg={T.teal} style={{width:"100%",justifyContent:"center"}} onClick={genCode}>🔑 Générer un code</Btn>
                        </div>
                    }
                  </div>;
                })()}
                <Btn bg={T.purple} style={{marginTop:12,width:"100%",justifyContent:"center"}} onClick={function(){setModal("obj");setFObj({titre:"",cat:"scol",pts:20,dateEch:"",jeuneId:selJ.id,noteEdu:"",cps:[]});}}>+ Nouvel objectif</Btn>
              </Card>
              {/* Radar CPS */}
              {(function(){
                var objsJ = p.objectifs.filter(function(o){return o.jeuneId===selJ.id;});
                var scores = {};
                CPS_ALL.forEach(function(c){ scores[c.id]={total:0,valide:0}; });
                objsJ.forEach(function(o){
                  (o.cps||[]).forEach(function(cid){
                    if(scores[cid]){ scores[cid].total++; if(o.statut==="valide") scores[cid].valide++; }
                  });
                });
                var hasCps = CPS_ALL.some(function(c){return scores[c.id].total>0;});
                if(!hasCps) return <Card style={{padding:14,border:"1px dashed "+T.brd2}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>🧠 Profil CPS</div>
                  <div style={{fontSize:11,color:T.tx3,textAlign:"center",padding:"8px 0"}}>Rattachez des CPS aux objectifs pour voir le profil apparaître ici.</div>
                </Card>;
                var maxTotal = Math.max(1, Math.max.apply(null, CPS_ALL.map(function(c){return scores[c.id].total;})));
                return <Card style={{padding:14}}>
                  <div style={{fontSize:12,fontWeight:800,marginBottom:12}}>🧠 Profil psychosocial</div>
                  {CPS_FAMILLES.map(function(fam){
                    var items = fam.items.filter(function(c){return scores[c.id].total>0;});
                    if(items.length===0) return null;
                    return <div key={fam.id} style={{marginBottom:12}}>
                      <div style={{fontSize:10,fontWeight:700,color:fam.couleur,textTransform:"uppercase",letterSpacing:1,marginBottom:6,padding:"2px 8px",borderRadius:20,background:fam.couleur+"18",display:"inline-block"}}>{fam.label}</div>
                      {items.map(function(c){
                        var sc=scores[c.id];
                        var pctVal=sc.total>0?Math.round(sc.valide/sc.total*100):0;
                        return <div key={c.id} style={{marginBottom:7}}>
                          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                            <span style={{fontSize:12}}>{c.ico}</span>
                            <span style={{fontSize:11,fontWeight:600,flex:1,color:T.tx}}>{c.label}</span>
                            <span style={{fontSize:10,color:fam.couleur,fontWeight:700}}>{sc.valide}/{sc.total}</span>
                          </div>
                          <div style={{height:7,background:T.bg3,borderRadius:99,overflow:"hidden"}}>
                            <div style={{width:(sc.total/maxTotal*100)+"%",height:"100%",background:fam.couleur+"33",borderRadius:99,position:"relative",overflow:"hidden"}}>
                              <div style={{width:pctVal+"%",height:"100%",background:fam.couleur,borderRadius:99,transition:"width .6s ease"}}/>
                            </div>
                          </div>
                        </div>;
                      })}
                    </div>;
                  })}
                  <div style={{fontSize:9,color:T.tx3,borderTop:"1px solid "+T.brd,paddingTop:6}}>Fond = objectifs en cours · Couleur pleine = validés</div>
                </Card>;
              })()}
              {/* Échanges en demande */}
              {p.echanges.filter(function(e){return e.jeuneId===selJ.id&&e.statut==="demande";}).length>0 && <Card style={{borderColor:T.purple+"55"}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.purpleL}}>🎁 Demandes de récompenses</div>
                {p.echanges.filter(function(e){return e.jeuneId===selJ.id&&e.statut==="demande";}).map(function(e){
                  var rec=p.recompenses.find(function(r){return r.id===e.recompenseId;});
                  return rec?<div key={e.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:20}}>{rec.ico}</span>
                    <span style={{flex:1,fontSize:13,fontWeight:600}}>{rec.titre}</span>
                    <Btn sm bg={T.green} onClick={function(){validerEchange(e.id);}}>✓</Btn>
                    <Btn sm bg={T.red} onClick={function(){refuserEchange(e.id);}}>✗</Btn>
                  </div>:null;
                })}
              </Card>}
            </div>
            {/* Colonne droite */}
            <div>
              <div style={{fontSize:13,color:T.tx3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontWeight:700}}>Objectifs</div>
              {p.objectifs.filter(function(o){return o.jeuneId===selJ.id;}).length===0 && <Card style={{textAlign:"center",padding:24}}>
                <div style={{fontSize:14,color:T.tx2}}>Aucun objectif — clique sur + Nouvel objectif</div>
              </Card>}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {p.objectifs.filter(function(o){return o.jeuneId===selJ.id;}).map(function(o){
                  var c=cat(o.cat);
                  var isAttente=o.statut==="attente_valid";
                  return <Card key={o.id} style={{borderLeft:"3px solid "+(o.statut==="valide"?T.greenL:isAttente?T.yellowL:o.statut==="refuse"?T.redL:c.c),background:isAttente?T.yellow+"08":""}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                      <div style={{fontSize:20,flexShrink:0}}>{c.ico}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{o.titre}</div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:o.commentaireJeune?6:0}}>
                          <Pill c={o.statut==="valide"?T.greenL:isAttente?T.yellowL:o.statut==="refuse"?T.redL:T.blueL}>
                            {o.statut==="valide"?"✅ Validé":isAttente?"⏳ À valider":o.statut==="refuse"?"❌ Non validé":"En cours"}
                          </Pill>
                          <Pill c={T.yellow}>{o.pts} pts</Pill>
                          {o.dateEch && <span style={{fontSize:11,color:T.tx3}}>📅 {o.dateEch}</span>}
                        </div>
                        {o.commentaireJeune && <div style={{fontSize:12,color:T.yellowL,background:T.yellow+"15",borderRadius:8,padding:"7px 10px",marginTop:4}}>
                          💬 <em>"{o.commentaireJeune}"</em>
                        </div>}
                        {o.noteEdu && <div style={{fontSize:12,color:T.greenL,marginTop:4,fontStyle:"italic"}}>Note : "{o.noteEdu}"</div>}
                        {o.cps&&o.cps.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                          {o.cps.map(function(cid){var cp=getCPS(cid);return cp?<span key={cid} style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:cp.familleCouleur+"22",color:cp.familleCouleur,border:"1px solid "+cp.familleCouleur+"44",fontWeight:600}}>{cp.ico} {cp.label}</span>:null;})}
                        </div>}
                      </div>
                      <div style={{display:"flex",gap:5,flexShrink:0}}>
                        {isAttente && <Btn sm bg={T.green} onClick={function(){validerObj(o.id,"");nf("✅ Validé !","success");}}>✓ Valider</Btn>}
                        {isAttente && <Btn sm bg={T.red} onClick={function(){refuserObj(o.id);}}>✗</Btn>}
                        {o.statut==="en_cours" && <Btn sm bg={T.green} onClick={function(){validerObj(o.id,"");nf("✅ Validé !","success");}}>✓</Btn>}
                        <Btn sm bg={T.bg3} color={T.tx3} onClick={function(){suppObj(o.id);}}>🗑</Btn>
                      </div>
                    </div>
                  </Card>;
                })}
              </div>
            </div>
          </div>}
        </div>}

        {/* ══ OBJECTIFS ══ */}
        {tab==="objectifs" && <div className="fu">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:800}}>🎯 Tous les objectifs</div>
            <Btn onClick={function(){setModal("obj");setFObj({titre:"",cat:"scol",pts:20,dateEch:"",jeuneId:"",noteEdu:""});}}>+ Créer</Btn>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            {[
              {k:"tous",l:"Tous",c:T.tx2},
              {k:"en_cours",l:"En cours",c:T.blueL},
              {k:"attente_valid",l:"À valider ⏳",c:T.yellowL, badge:nbAttente},
              {k:"valide",l:"Validés ✅",c:T.greenL},
              {k:"refuse",l:"Non validés",c:T.redL},
            ].map(function(f){
              return <Btn key={f.k} sm ghost color={filt===f.k?f.c:T.tx2} brdC={filt===f.k?f.c:T.brd} onClick={function(){setFilt(f.k);}}>
                {f.l}{f.badge>0?" ("+f.badge+")":""}
              </Btn>;
            })}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtObjs.map(function(o){
              var j=jeunes.find(function(x){return x.id===o.jeuneId;});
              var c=cat(o.cat);
              var isAtt=o.statut==="attente_valid";
              return <Card key={o.id} style={{borderLeft:"3px solid "+(o.statut==="valide"?T.greenL:isAtt?T.yellowL:o.statut==="refuse"?T.redL:c.c),background:isAtt?T.yellow+"08":""}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <div style={{fontSize:22,flexShrink:0}}>{c.ico}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:14,fontWeight:700}}>{o.titre}</span>
                      <Pill c={o.statut==="valide"?T.greenL:isAtt?T.yellowL:o.statut==="refuse"?T.redL:T.blueL}>
                        {o.statut==="valide"?"✅":isAtt?"⏳ À valider":o.statut==="refuse"?"❌":"En cours"}
                      </Pill>
                      <Pill c={T.yellow}>{o.pts} pts</Pill>
                    </div>
                    {j && <div style={{fontSize:12,color:T.tx2}}>{j.avatar} {j.prenom} {j.nom}{o.dateEch?" · 📅 "+o.dateEch:""}</div>}
                    {o.commentaireJeune && <div style={{fontSize:12,color:T.yellowL,marginTop:5,background:T.yellow+"15",borderRadius:8,padding:"6px 10px"}}>💬 <em>"{o.commentaireJeune}"</em></div>}
                    {o.cps&&o.cps.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                      {o.cps.map(function(cid){var cp=getCPS(cid);return cp?<span key={cid} style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:cp.familleCouleur+"22",color:cp.familleCouleur,border:"1px solid "+cp.familleCouleur+"44",fontWeight:600}}>{cp.ico} {cp.label}</span>:null;})}
                    </div>}
                  </div>
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    {isAtt && <Btn sm bg={T.green} onClick={function(){validerObj(o.id,"");}}>✓ Valider</Btn>}
                    {isAtt && <Btn sm bg={T.red} onClick={function(){refuserObj(o.id);}}>✗ Refuser</Btn>}
                    {o.statut==="en_cours" && <Btn sm bg={T.green} onClick={function(){validerObj(o.id,"");}}>✓</Btn>}
                    <Btn sm bg={T.bg3} color={T.tx3} onClick={function(){suppObj(o.id);}}>🗑</Btn>
                  </div>
                </div>
              </Card>;
            })}
            {filtObjs.length===0 && <Card style={{textAlign:"center",padding:30,color:T.tx2}}>Aucun objectif dans cette catégorie.</Card>}
          </div>
        </div>}

        {/* ══ RÉCOMPENSES ══ */}
        {tab==="recompenses" && <div className="fu">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:800}}>🎁 Récompenses</div>
            <Btn onClick={function(){setModal("rec");setFRec({titre:"",ico:"🎁",cout:50,description:"",structureId:sId||1});}}>+ Ajouter</Btn>
          </div>

          {/* Demandes en attente */}
          {nbEchDemande>0 && <Card style={{marginBottom:16,borderColor:T.purple+"55",background:T.purple+"0a"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12,color:T.purpleL}}>🎁 Demandes en attente — {nbEchDemande}</div>
            {p.echanges.filter(function(e){return e.statut==="demande"&&jeunes.find(function(j){return j.id===e.jeuneId;});}).map(function(e){
              var j=jeunes.find(function(x){return x.id===e.jeuneId;});
              var r=p.recompenses.find(function(x){return x.id===e.recompenseId;});
              return r&&j?<div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid "+T.brd}}>
                <span style={{fontSize:24}}>{r.ico}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700}}>{r.titre}</div>
                  <div style={{fontSize:12,color:T.tx2}}>Demandé par {j.avatar} {j.prenom} · {e.date}</div>
                </div>
                <Pill c={T.yellow}>{r.cout} pts</Pill>
                <Btn sm bg={T.green} onClick={function(){validerEchange(e.id);}}>✅ Accorder</Btn>
                <Btn sm bg={T.red} onClick={function(){refuserEchange(e.id);}}>❌ Refuser</Btn>
              </div>:null;
            })}
          </Card>}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
            {myRecs.map(function(r){
              var cr=p.users.find(function(x){return x.id===r.creePar;});
              var sts=r.structureId?p.structures.find(function(s){return s.id===r.structureId;}):null;
              return <Card key={r.id}>
                <div style={{textAlign:"center",marginBottom:12}}>
                  <div style={{fontSize:42,marginBottom:8}}>{r.ico}</div>
                  <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>{r.titre}</div>
                  <div style={{fontSize:12,color:T.tx2,marginBottom:8}}>{r.description}</div>
                  <div style={{display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap"}}>
                    <Pill c={T.yellow}>{r.cout} pts</Pill>
                    {sts && <Pill c={sts.couleur}>{sts.emoji} {sts.nom}</Pill>}
                    {!sts && <Pill c={T.purple}>🌍 Global</Pill>}
                  </div>
                  {cr && <div style={{marginTop:6,fontSize:11,color:T.tx3}}>Créée par {cr.prenom}</div>}
                </div>
                <Btn ghost color={T.redL} brdC={T.red} sm style={{width:"100%",justifyContent:"center"}} onClick={function(){p.setRecompenses(function(prev){return prev.filter(function(x){return x.id!==r.id;});});nf("Récompense supprimée","warn");}}>Supprimer</Btn>
              </Card>;
            })}
          </div>
        </div>}

        {/* ══ STATS ══ */}
        {tab==="stats" && (function(){
          var statCols={"valide":"#22c55e","en_cours":"#1a6bff","attente_valid":"#eab308","refuse":"#e03a3a"};
          var statLbls={"valide":"✅ Validé","en_cours":"🔵 En cours","attente_valid":"⏳ Attente","refuse":"❌ Refusé"};
          // Tous les objectifs de la structure de l'éducateur (indépendant de selJ)
          var sBaseObjs=p.objectifs.filter(function(o){return !!jeunes.find(function(j){return j.id===o.jeuneId;});});
          var sObjs=filtJeuneStat==="tous"?sBaseObjs:sBaseObjs.filter(function(o){return o.jeuneId===Number(filtJeuneStat);});
          var sSorted=[].concat(sObjs).sort(function(a,b){return b.id-a.id;});
          // CPS
          var cpsStat={};
          CPS_ALL.forEach(function(c){cpsStat[c.id]={total:0,valide:0};});
          sObjs.forEach(function(o){(o.cps||[]).forEach(function(cid){if(cpsStat[cid]){cpsStat[cid].total++;if(o.statut==="valide")cpsStat[cid].valide++;}});});
          var cpsUsed=CPS_ALL.filter(function(c){return cpsStat[c.id].total>0;});
          var bestCps=cpsUsed.length>0?cpsUsed.reduce(function(best,c){
            if(!best)return c;
            var br=cpsStat[best.id].valide/Math.max(1,cpsStat[best.id].total);
            var cr=cpsStat[c.id].valide/Math.max(1,cpsStat[c.id].total);
            return cr>br||(cr===br&&cpsStat[c.id].total>cpsStat[best.id].total)?c:best;
          },null):null;
          var worstCps=cpsUsed.length>1?cpsUsed.reduce(function(worst,c){
            if(!worst)return c;
            var wr=cpsStat[worst.id].valide/Math.max(1,cpsStat[worst.id].total);
            var cr=cpsStat[c.id].valide/Math.max(1,cpsStat[c.id].total);
            return cr<wr?c:worst;
          },null):null;
          if(bestCps&&worstCps&&bestCps.id===worstCps.id)worstCps=null;

          return <div className="fu">
            <div style={{fontSize:18,fontWeight:800,marginBottom:20}}>📊 Statistiques</div>

            {/* KPIs */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:20}}>
              {[
                {ico:"👥",v:jeunes.length,l:"Jeunes",c:T.blue},
                {ico:"🎯",v:sBaseObjs.length,l:"Objectifs",c:T.purple},
                {ico:"✅",v:sBaseObjs.filter(function(o){return o.statut==="valide";}).length,l:"Validés",c:T.green},
                {ico:"⏳",v:nbAttente,l:"À valider",c:T.yellow},
                {ico:"🎁",v:p.echanges.filter(function(e){return e.statut==="accordee"&&jeunes.find(function(j){return j.id===e.jeuneId;});}).length,l:"Récompenses",c:T.pink},
              ].map(function(s,i){
                return <Card key={i} style={{textAlign:"center"}}>
                  <div style={{fontSize:26,marginBottom:6}}>{s.ico}</div>
                  <div style={{fontFamily:FONT_D,fontSize:26,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:11,color:T.tx3}}>{s.l}</div>
                </Card>;
              })}
            </div>

            {/* Filtre par jeune */}
            <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:13,fontWeight:700,color:T.tx2}}>Filtrer par jeune :</span>
              <select value={filtJeuneStat} onChange={function(e){setFiltJeuneStat(e.target.value);}} style={{background:T.bg3,border:"1px solid "+T.brd2,borderRadius:9,padding:"7px 12px",fontSize:13,color:T.tx}}>
                <option value="tous">Tous les jeunes</option>
                {jeunes.map(function(j){return <option key={j.id} value={String(j.id)}>{j.avatar} {j.prenom}</option>;})}
              </select>
              <span style={{fontSize:12,color:T.tx3}}>{sSorted.length} objectif(s)</span>
              {filtJeuneStat!=="tous"&&<span role="button" onClick={function(){setFiltJeuneStat("tous");}} style={{fontSize:12,color:T.purpleL,cursor:"pointer",textDecoration:"underline"}}>Voir tous</span>}
            </div>

            {/* CPS mise en exergue */}
            {cpsUsed.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {bestCps&&<div style={{background:"#22c55e18",border:"1px solid #22c55e44",borderRadius:12,padding:"12px 16px",borderLeft:"4px solid #22c55e"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#22c55e",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>🏆 CPS la plus réussie</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:22}}>{bestCps.ico}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:800}}>{bestCps.label}</div>
                    <div style={{fontSize:10,color:bestCps.familleCouleur,fontWeight:600}}>{bestCps.familleLabel}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:FONT_D,fontSize:20,color:"#22c55e"}}>{Math.round(cpsStat[bestCps.id].valide/Math.max(1,cpsStat[bestCps.id].total)*100)}%</div>
                    <div style={{fontSize:10,color:T.tx3}}>{cpsStat[bestCps.id].valide}/{cpsStat[bestCps.id].total} validés</div>
                  </div>
                </div>
              </div>}
              {worstCps&&<div style={{background:"#e03a3a18",border:"1px solid #e03a3a44",borderRadius:12,padding:"12px 16px",borderLeft:"4px solid #e03a3a"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#e03a3a",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>🔴 CPS la moins réussie</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:22}}>{worstCps.ico}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:800}}>{worstCps.label}</div>
                    <div style={{fontSize:10,color:worstCps.familleCouleur,fontWeight:600}}>{worstCps.familleLabel}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:FONT_D,fontSize:20,color:"#e03a3a"}}>{Math.round(cpsStat[worstCps.id].valide/Math.max(1,cpsStat[worstCps.id].total)*100)}%</div>
                    <div style={{fontSize:10,color:T.tx3}}>{cpsStat[worstCps.id].valide}/{cpsStat[worstCps.id].total} validés</div>
                  </div>
                </div>
              </div>}
            </div>}

            {/* Objectifs — ordre chronologique inverse */}

// ── App Root ──────────────────────────────────────────────────────────────────
function App() {
  var [isDark, setIsDark] = useState(function(){
    try { return localStorage.getItem("objp-theme") === "dark"; } catch(e) { return false; }
  });

  var palette = isDark ? PALETTE_DARK : PALETTE_LIGHT;

  useStyles(palette);

  function toggleTheme() {
    setIsDark(function(d) {
      var next = !d;
      try { localStorage.setItem("objp-theme", next ? "dark" : "light"); } catch(e) {}
      return next;
    });
  }

  // ── Données chargées depuis le serveur (partagées entre tous les postes) ──────
  var [users,       setUsers]       = useState([]);
  var [objectifs,   setObjectifs]   = useState([]);
  var [recompenses, setRecompenses] = useState([]);
  var [echanges,    setEchanges]    = useState([]);
  var [structures,  setStructures]  = useState([]);
  var [tickets,     setTickets]     = useState([]);
  var [dataLoaded,  setDataLoaded]  = useState(false);
  var saveRef = useRef(null);

  useEffect(function(){
    apiGet("/api/data").then(function(d){
      // Normalise les IDs en nombres pour éviter les erreurs de comparaison stricte (=== )
      // quand structureId est stocké comme chaîne dans la base
      var normStructures = (d.structures||[]).map(function(s){
        return Object.assign({}, s, {id: s.id != null ? Number(s.id) : s.id});
      });
      var structureIdSet = new Set(normStructures.map(function(s){return s.id;}));
      var normUsers = (d.users||[]).map(function(u){
        var sid = u.structureId != null ? Number(u.structureId) : null;
        // Si le structureId ne correspond à aucune structure existante et qu'il n'y a qu'une
        // seule structure, on rattache automatiquement (répare les refs orphelines)
        if(sid !== null && !structureIdSet.has(sid) && normStructures.length === 1) {
          sid = normStructures[0].id;
        }
        return Object.assign({}, u, {
          id: u.id != null ? Number(u.id) : u.id,
          structureId: sid
        });
      });
      setUsers(normUsers);
      setObjectifs(d.objectifs||[]);
      setRecompenses(d.recompenses||[]);
      setEchanges(d.echanges||[]);
      setStructures(normStructures);
      setTickets(d.tickets||[]);
      setDataLoaded(true);
    }).catch(function(){ setDataLoaded(true); });
  }, []);

  // Sauvegarde automatique vers le serveur (debounce 800 ms)
  useEffect(function(){
    if (!dataLoaded) return;
    if (saveRef.current) clearTimeout(saveRef.current);
    saveRef.current = setTimeout(function(){
      apiPost("/api/data",{users:users,objectifs:objectifs,recompenses:recompenses,echanges:echanges,structures:structures,tickets:tickets});
    }, 800);
  }, [users, objectifs, recompenses, echanges, structures, tickets, dataLoaded]);

  var [currentUser,  setCurrentUser]  = useState(null);
  var [notif,        setNotif]        = useState(null);

  function notify(msg,type){setNotif({msg,type});setTimeout(function(){setNotif(null);},3200);}

  // ── Sauvegarde des données ──────────────────────────────────────────────────
  function exporterSauvegarde() {
    var today = new Date().toISOString().slice(0,10);
    var now   = new Date().toLocaleString("fr-FR");
    var data  = {
      version: "V5",
      date: now,
      structures: structures,
      users: users.map(function(u){ return Object.assign({}, u, {mdp: "[protégé]"}); }),
      objectifs: objectifs,
      recompenses: recompenses,
      echanges: echanges,
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href   = url;
    a.download = "objectifplus_sauvegarde_" + today + ".json";
    a.click();
    URL.revokeObjectURL(url);
    notify("💾 Sauvegarde téléchargée ! (" + now + ")", "success");
  }

  function handleLogin(u) { setCurrentUser(u); }
  function handleLogout() { setToken(null); setCurrentUser(null); }

  return (
    <ThemeCtx.Provider value={palette}>
      {!currentUser && <LoginScreen
        users={users}
        onLogin={handleLogin}
        onToggleTheme={toggleTheme}
        isDark={isDark}
      />}

      {currentUser && currentUser.role==="superviseur_dt" && <SupervisionDT
        user={currentUser}
        users={users}
        structures={structures}
        objectifs={objectifs}
        echanges={echanges}
        onLogout={handleLogout}
        onToggleTheme={toggleTheme}
        isDark={isDark}
      />}

      {currentUser && currentUser.role==="jeune" && <DashJeune
        user={currentUser}
        objectifs={objectifs}
        setObjectifs={setObjectifs}
        recompenses={recompenses}
        echanges={echanges}
        setEchanges={setEchanges}
        structures={structures}
        notify={notify}
        onLogout={handleLogout}
        onToggleTheme={toggleTheme}
        isDark={isDark}
      />}

      {currentUser && currentUser.role!=="superviseur_dt" && currentUser.role!=="jeune" && <InterfacePro
        user={currentUser}
        users={users}
        setUsers={setUsers}
        setCurrentUser={setCurrentUser}
        structures={structures}
        setStructures={setStructures}
        objectifs={objectifs}
        setObjectifs={setObjectifs}
        recompenses={recompenses}
        setRecompenses={setRecompenses}
        echanges={echanges}
        setEchanges={setEchanges}
        tickets={tickets}
        setTickets={setTickets}
        onLogout={handleLogout}
        onToggleTheme={toggleTheme}
        isDark={isDark}
        onExporterSauvegarde={exporterSauvegarde}
      />}

      {/* Sauvegarde automatique active — rappel du soir supprimé */}

    </ThemeCtx.Provider>
  );
}


ReactDOM.render(<App />, document.getElementById('root'));
